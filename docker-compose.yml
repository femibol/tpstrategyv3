# Docker Compose: Trading Bot + IB Gateway
#
# IBKR is the sole data + execution broker.
# IB Gateway auto-logs in via IBC. First time setup requires VNC:
#   ssh -L 5900:localhost:5900 root@YOUR_IP
#   VNC to localhost:5900 (password from .env VNC_PASSWORD)
#   Click "Accept" on any API connection dialog (once, then persisted)
#
# Usage:
#   Start:     docker compose up -d
#   Logs:      docker compose logs -f trading-bot
#   Dashboard: http://YOUR_IP:5000

services:
  ib-gateway:
    # Pinned tag (stable) so a surprise IBKR version popup doesn't
    # silently brick the container mid-week. Bump deliberately when
    # you're at a computer and can VNC through any first-run dialog.
    # Use `:latest` only when testing image updates.
    image: gnzsnz/ib-gateway:10.19.2i
    restart: unless-stopped
    environment:
      # IBC + IBKR session scheduling uses container-local time. Without
      # this, anything time-based (restart windows, log timestamps) runs in
      # UTC and is confusing vs. what you see in Discord / the dashboard.
      # gnzsnz honors both TZ (standard Linux) and TIME_ZONE (image-specific).
      TZ: "America/New_York"
      TIME_ZONE: "America/New_York"
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      BYPASS_WARNING: "yes"
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-password}
      # Nightly cold-restart window — IBC kills and relaunches the gateway
      # at this local time daily. Clears any stuck dialog, re-logs in,
      # ready for market open. 04:00 ET is pre-premarket (bot resumes
      # by 04:05 in time for 04:00 crypto + 04:00 premarket scans).
      AUTO_RESTART_TIME: "04:00"
      RELOGIN_AFTER_TWO_FA_TIMEOUT: "yes"
      # If the "Reconnect / Exit session" prompt appears during a restart,
      # automatically click Reconnect instead of stalling for a human.
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      TWO_FA_IN_ACTION: "exit"
      # gnzsnz uses /home/ibgateway/Jts (not /root/Jts)
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
    ports:
      - "4001:4001"
      - "4002:4002"
      - "5900:5900"
    volumes:
      - ib-gateway-data:/home/ibgateway/Jts
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | awk '{print $$2}' | grep -qi ':0FA2' || cat /proc/net/tcp | awk '{print $$2}' | grep -qi ':0FA1'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    labels:
      # autoheal watches this label and restarts the container when its
      # healthcheck fails. Fixes the recurring "IB Gateway stuck on a
      # popup for hours while the user isn't at a computer" problem.
      - "autoheal=true"

  trading-bot:
    build: .
    restart: unless-stopped
    depends_on:
      # Wait for the gateway's healthcheck to pass before the bot even
      # starts. Prevents the "bot boots, tries to connect, DNS not ready
      # yet, gives up" race that loses trading minutes every restart.
      ib-gateway:
        condition: service_healthy
    environment:
      # Timezone (critical for APScheduler)
      TZ: "America/New_York"

      # Mode
      TRADING_MODE: ${TRADING_MODE:-paper}

      # IBKR — sole broker
      IBKR_HOST: ib-gateway
      IBKR_PORT: ${IBKR_PORT:-4002}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}

      # Claude AI — pre-trade validation + self-improvement
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Optional
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GOOGLE_SHEETS_CREDENTIALS: ${GOOGLE_SHEETS_CREDENTIALS}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
      TRADINGVIEW_WEBHOOK_SECRET: ${TRADINGVIEW_WEBHOOK_SECRET}

      # Dashboard
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 5000
      DASHBOARD_SECRET_KEY: ${DASHBOARD_SECRET_KEY:-change-me}
    ports:
      - "5000:5000"
    volumes:
      # Bind-mount to host so ./logs and ./data are readable without
      # `docker compose exec`. Makes `tail logs/trading.log` and
      # `cat data/trade_history.json` work directly from /opt/trading-bot.
      - ./data:/app/data
      - ./logs:/app/logs

  # Watches all containers with label autoheal=true and restarts them
  # automatically when their healthcheck reports unhealthy. Tiny Alpine
  # image (~15MB). Fixes the current weakness where a stuck IB Gateway
  # dialog silently wastes a full trading day.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "30"        # check every 30s
      AUTOHEAL_START_PERIOD: "120"   # wait 2min after container start before checking (matches healthcheck start_period)
      TZ: "America/New_York"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  ib-gateway-data:
