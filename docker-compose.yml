# Docker Compose: Trading Bot + IB Gateway
#
# IBKR is the sole data + execution broker.
# IB Gateway auto-logs in via IBC. First time setup requires VNC:
#   ssh -L 5900:localhost:5900 root@YOUR_IP
#   VNC to localhost:5900 (password from .env VNC_PASSWORD)
#   Click "Accept" on any API connection dialog (once, then persisted)
#
# Usage:
#   Start:     docker compose up -d
#   Logs:      docker compose logs -f trading-bot
#   Dashboard: http://YOUR_IP:5000

services:
  ib-gateway:
    # 2026-04-24: SWITCHED FROM unusualalpha BACK TO gnzsnz.
    # unusualalpha is effectively abandoned — their `:latest` ships
    # IB Gateway 10.22.1m (3-year-old build) which IBKR has
    # server-side deprecated. Symptom: gateway boots and logs in
    # cleanly, IBC dismisses no dialog, but every API handshake to
    # 4002 silently EOFs because IBKR's auth layer rejects the
    # too-old client. Confirmed via VNC: dialog "The version of the
    # application you are running, 1022.1m, is no longer supported."
    #
    # gnzsnz pipeline (which we previously fled in PR #116 due to a
    # JAR-vs-IBC version mismatch in their 10.32 build) has since
    # recovered — `:stable` ships 10.37.1r and `:latest` ships
    # 10.46.1c, both pushed within the last week and well past
    # IBKR's deprecation cutoff. Pinning to `:stable` (production
    # channel per their docs) for fewer surprises than `:latest`.
    image: gnzsnz/ib-gateway:stable
    restart: unless-stopped
    environment:
      # IBC + IBKR session scheduling uses container-local time. Without
      # this, anything time-based (restart windows, log timestamps) runs in
      # UTC and is confusing vs. what you see in Discord / the dashboard.
      # gnzsnz honors both TZ (standard Linux) and TIME_ZONE (image-specific).
      TZ: "America/New_York"
      TIME_ZONE: "America/New_York"
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      BYPASS_WARNING: "yes"
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-password}
      # Nightly cold-restart (silent, no relogin required). 23:45 ET is
      # before IBKR's own midnight reset, so we control the restart window.
      AUTO_RESTART_TIME: "23:45"
      # Recover automatically if a 2FA prompt appears & times out.
      TWOFA_TIMEOUT_ACTION: "restart"
      RELOGIN_AFTER_TWO_FA_TIMEOUT: "yes"
      # If another session is detected, seize it (bot must own the connection).
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      # Dismiss the three most common blocking dialogs so IBC doesn't stall
      # waiting on a human click. These are the config.ini lines the
      # algotrading community has converged on; gnzsnz passes them through.
      ALLOW_BLIND_TRADING: "yes"
      DISMISS_PASSWORD_EXPIRY_WARNING: "yes"
      DISMISS_NSE_COMPLIANCE: "yes"
      # gnzsnz uses /home/ibgateway/Jts (not /root/Jts)
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
    ports:
      - "4001:4001"
      - "4002:4002"
      - "5900:5900"
      # Dashboard — exposed on the gateway service because trading-bot
      # shares this container's network namespace (network_mode:
      # "service:ib-gateway"). Bot listens on 0.0.0.0:5000 *inside* the
      # shared netns, which is the same network surface as ib-gateway.
      - "5000:5000"
    volumes:
      - ib-gateway-data:/home/ibgateway/Jts
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | awk '{print $$2}' | grep -qi ':0FA2' || cat /proc/net/tcp | awk '{print $$2}' | grep -qi ':0FA1'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    labels:
      # autoheal watches this label and restarts the container when its
      # healthcheck fails. Fixes the recurring "IB Gateway stuck on a
      # popup for hours while the user isn't at a computer" problem.
      - "autoheal=true"

  trading-bot:
    build: .
    restart: unless-stopped
    # Share ib-gateway's network namespace. Two reasons:
    #
    # 1. IB Gateway's TrustedIPs setting can only be reliably configured
    #    via the GUI — it gets rewritten on every boot from internal
    #    state, defeating sed/chattr workarounds. Sharing the netns means
    #    our connections originate from 127.0.0.1 (the gateway's view of
    #    its own loopback), which IS in TrustedIPs by default. No more
    #    needing VNC to whitelist 172.18.x.x docker bridge IPs.
    #
    # 2. The bot's IBKR client now connects to localhost:4002 — same
    #    network stack as the gateway process. Faster than going through
    #    docker bridge networking, and immune to docker-network DNS
    #    flapping when ib-gateway restarts.
    #
    # Tradeoff: trading-bot can't have its own port mappings (the
    # service-mode netns owns the port table). Dashboard 5000 moves to
    # ib-gateway's `ports:` section above.
    network_mode: "service:ib-gateway"
    depends_on:
      # Relaxed from condition: service_healthy to condition: service_started
      # during gateway-image instability. The bot's internal reconnect loop
      # (10 attempts, ~2.5 min) handles the case where gateway is still
      # booting; it also keeps retrying indefinitely via the health_check
      # job. If gateway is fully broken, bot at least comes up so the
      # dashboard + notifications work and we can see logs.
      ib-gateway:
        condition: service_started
    environment:
      # Timezone (critical for APScheduler)
      TZ: "America/New_York"

      # Mode
      TRADING_MODE: ${TRADING_MODE:-paper}

      # IBKR — sole broker. Connecting via localhost (we share
      # ib-gateway's network namespace via network_mode above), so
      # our source IP is 127.0.0.1 — already in IB Gateway's default
      # TrustedIPs whitelist. No GUI/VNC config needed.
      IBKR_HOST: 127.0.0.1
      IBKR_PORT: ${IBKR_PORT:-4002}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}

      # Claude AI — pre-trade validation + self-improvement
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Optional
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GOOGLE_SHEETS_CREDENTIALS: ${GOOGLE_SHEETS_CREDENTIALS}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
      TRADINGVIEW_WEBHOOK_SECRET: ${TRADINGVIEW_WEBHOOK_SECRET}

      # Dashboard
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 5000
      DASHBOARD_SECRET_KEY: ${DASHBOARD_SECRET_KEY:-change-me}
    # No ports: section — see network_mode comment above. Dashboard
    # 5000 is exposed on ib-gateway's port mapping since we share its
    # network namespace.
    volumes:
      # Bind-mount to host so ./logs and ./data are readable without
      # `docker compose exec`. Makes `tail logs/trading.log` and
      # `cat data/trade_history.json` work directly from /opt/trading-bot.
      - ./data:/app/data
      - ./logs:/app/logs
      # Read-write access to Docker socket so the bot can self-heal by
      # restarting the ib-gateway container when its API wedges (TCP open
      # but handshake dead). Gated by safety caps in engine.py:
      #   - 3 restart attempts per day max
      #   - 10 min cooldown between restart attempts
      #   - Only fires after 10 consecutive reconnect failures (~5 min)
      # Mount requires RW (not :ro) because container.restart() issues
      # a POST that modifies daemon state.
      - /var/run/docker.sock:/var/run/docker.sock

  # Watches all containers with label autoheal=true and restarts them
  # automatically when their healthcheck reports unhealthy. Tiny Alpine
  # image (~15MB). Fixes the current weakness where a stuck IB Gateway
  # dialog silently wastes a full trading day.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "30"        # check every 30s
      AUTOHEAL_START_PERIOD: "120"   # wait 2min after container start before checking (matches healthcheck start_period)
      TZ: "America/New_York"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  ib-gateway-data:
