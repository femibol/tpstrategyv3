# IB Gateway / TWS settings for API automation
# Auto-copied into the container's settings path on start
# These settings enable API access that the GUI normally asks about

[Logon]
s3store=true
Locale=en
displayedproxymsg=1
UseSSL=true

[IBGateway]
ApiOnly=true
TrustedIPs=127.0.0.1,172.16.0.0/12,10.0.0.0/8
MainWindow.Width=1024
MainWindow.Height=768
Steps.AcceptIncomingApiConnection=true

[Communication]
ctciSocketPort=4002
SocketPort=4002
OverrideTwsApiPort=4002

[TWS]
PortOpen=true
AcceptIncomingApiConnection=true
TrustedIPs=127.0.0.1,172.16.0.0/12,10.0.0.0/8
