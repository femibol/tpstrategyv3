# Render.com deployment blueprint
# Deploys the trading bot + dashboard as a web service
# Dashboard accessible from your phone at https://your-app.onrender.com
#
# ALL secrets are set manually in Render dashboard (sync: false)
# Only non-sensitive config values are stored here.

services:
  # Main trading bot + dashboard
  - type: web
    name: algobot
    runtime: python
    plan: starter  # $7/mo - always on, no sleep
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --preload
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: TRADING_MODE
        value: paper
      # === IBKR (Primary data + execution) ===
      # Set IBKR_HOST to your IB Gateway IP (e.g. VPS running IB Gateway)
      - key: IBKR_HOST
        sync: false  # Set in Render dashboard (e.g. your-vps-ip)
      - key: IBKR_PORT
        value: "4002"  # 4002=Gateway Paper, 4001=Gateway Live
      - key: IBKR_CLIENT_ID
        value: "1"
      # === Alpaca Markets (real-time data + paper trading) ===
      - key: ALPACA_API_KEY
        sync: false  # Set in Render dashboard
      - key: ALPACA_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: ALPACA_BASE_URL
        value: "https://paper-api.alpaca.markets"
      # === TradersPost (stock + crypto webhooks) ===
      - key: TRADERSPOST_WEBHOOK_URL
        sync: false  # Set in Render dashboard
      - key: TRADERSPOST_WEBHOOK_URL_CRYPTO
        sync: false  # Set in Render dashboard
      - key: TRADERSPOST_API_KEY
        sync: false
      # === TradingView ===
      - key: TRADINGVIEW_WEBHOOK_SECRET
        sync: false
      # === News API ===
      - key: NEWS_API_KEY
        sync: false  # Set in Render dashboard
      # === Notifications ===
      - key: DISCORD_WEBHOOK_URL
        sync: false
      # === Claude AI (trade analysis & insights) ===
      - key: ANTHROPIC_API_KEY
        sync: false
      # === Dashboard ===
      - key: DASHBOARD_SECRET_KEY
        generateValue: true
      - key: DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DASHBOARD_PORT
        value: "10000"
      - key: RENDER
        value: "true"
