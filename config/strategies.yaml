# --- RVOL Scalp Strategy (1-Minute Quick Breakout) ---
# Ultra-fast scalping on 1-minute bars - the volume machine
# Catches quick RVOL breakouts, takes profit on same candle if uptick continues
rvol_scalp:
  enabled: true
  timeframe: "1m"
  min_rvol: 2.0                    # Lowered to catch more setups (was 2.5)
  min_score: 50                    # Lowered - more aggressive entry (was 60)
  min_price: 1.00                  # $1 floor — catch low-priced runners (was $2)
  max_price: 100.00                # Raised to $100 — catch mid-cap momentum (was $50)
  min_volume: 100000               # 100K min — more accessible (was 200K)
  atr_stop_multiplier: 1.0        # Tight stop: 1x ATR
  atr_target_multiplier: 2.0      # Wider target: 2x ATR (was 1.5 — too tight)
  quick_scalp_target_pct: 0.012   # Take profit at +1.2% (was 0.6% — inside the spread)
  runner_target_pct: 0.025        # Runners to +2.5% (was 2%)
  max_hold_minutes: 15             # Max 15 minutes (was 10)
  max_trades_per_day: 15           # Quality over quantity (was 35)
  same_candle_exit: true
  price_poll_seconds: 3
  breakout_confirmation_bars: 2
  momentum_acceleration: true
  symbols:
