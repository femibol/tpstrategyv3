# ============================================
# STRATEGY CONFIGURATIONS
# ============================================

# --- Strategy Allocation ---
# How capital is split across strategies
allocation:
  mean_reversion: 0.30            # 30% of capital
  momentum: 0.30                  # 30% of capital
  vwap_scalp: 0.20                # 20% of capital
  pairs_trading: 0.20             # 20% of capital

# --- Mean Reversion Strategy ---
# Buy oversold, sell overbought - bread & butter for small accounts
mean_reversion:
  enabled: true
  timeframe: "5m"
  lookback_period: 20             # 20-period lookback
  entry_zscore: -2.0              # Enter when 2 std devs below mean
  exit_zscore: 0.0                # Exit at mean
  rsi_oversold: 30                # RSI below 30
  rsi_overbought: 70              # RSI above 70
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5         # Min volatility filter
  max_holding_periods: 20         # Max hold 20 bars (100 min on 5m)
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - NVDA
    - AMD

# --- Momentum / Trend Following ---
# Ride strong trends - let winners run
momentum:
  enabled: true
  timeframe: "15m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 25               # Only trade strong trends (ADX > 25)
  volume_surge_multiplier: 1.5    # Need 1.5x avg volume
  atr_period: 14
  atr_stop_multiplier: 2.0        # Stop loss at 2x ATR
  atr_target_multiplier: 4.0      # Target at 4x ATR (2:1 R/R)
  max_holding_bars: 40            # Max hold 40 bars (10 hours on 15m)
  breakout_lookback: 20           # 20-bar breakout detection
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - TSLA
    - NVDA
    - AMD
    - AMZN
    - META
    - GOOGL
    - NFLX

# --- VWAP Scalping ---
# Trade around VWAP like institutional desks
vwap_scalp:
  enabled: true
  timeframe: "1m"
  vwap_bands: 2                   # Number of VWAP standard deviation bands
  entry_band: 1                   # Enter at 1st band
  exit_at_vwap: true              # Exit at VWAP
  min_distance_from_vwap: 0.003   # Min 0.3% from VWAP to enter
  max_distance_from_vwap: 0.015   # Max 1.5% from VWAP
  volume_confirmation: true        # Need volume spike to confirm
  max_trades_per_day: 6           # Limit overtrading
  max_holding_minutes: 30         # Quick scalps only
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD

# --- Pairs Trading (Statistical Arbitrage) ---
# Trade correlated pairs - market neutral
pairs_trading:
  enabled: true
  timeframe: "15m"
  lookback_period: 60             # 60-period correlation window
  min_correlation: 0.80           # Minimum correlation
  entry_zscore: 2.0               # Enter when spread is 2 std devs
  exit_zscore: 0.5                # Exit when spread narrows to 0.5
  stop_zscore: 3.5                # Stop if spread widens to 3.5
  max_holding_bars: 30            # Max hold 30 bars
  pairs:
    - ["AAPL", "MSFT"]
    - ["GOOGL", "META"]
    - ["AMD", "NVDA"]
    - ["XLF", "JPM"]
    - ["SPY", "QQQ"]

# --- TradingView Signal Strategy ---
# Execute signals received from TradingView alerts
tradingview_signals:
  enabled: true
  validate_signals: true          # Validate signals against risk rules
  allowed_actions: ["buy", "sell", "close"]
  require_confirmation: false     # No manual confirmation needed (fully auto)
  max_signal_age_seconds: 30      # Ignore signals older than 30 sec
