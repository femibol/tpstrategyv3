# ============================================
# STRATEGY CONFIGURATIONS
# ============================================

# --- Strategy Allocation ---
# How capital is split across strategies
allocation:
  smc_forever: 0.15               # 15% - highest conviction model
  mean_reversion: 0.10            # 10% of capital
  momentum: 0.10                  # 10% of capital
  rvol_momentum: 0.15             # 15% - Money Machine RVOL auto-trading (5-min)
  rvol_scalp: 0.25                # 25% - RVOL scalp (1-min bars, quick in/out)
  vwap_scalp: 0.10                # 10% of capital
  pairs_trading: 0.15             # 15% of capital

# --- Mean Reversion Strategy ---
# Buy oversold, sell overbought - bread & butter for small accounts
mean_reversion:
  enabled: true
  timeframe: "5m"
  lookback_period: 20             # 20-period lookback
  entry_zscore: -1.8              # Lowered from -2.0 - catch more reversals
  exit_zscore: 0.0                # Exit at mean
  rsi_oversold: 35                # Raised from 30 - more entries
  rsi_overbought: 70              # RSI above 70
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5         # Min volatility filter
  max_holding_periods: 20         # Max hold 20 bars (100 min on 5m)
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - NVDA
    - AMD
    - BTC-USD
    - ETH-USD
    - SOL-USD

# --- Momentum / Trend Following ---
# Ride strong trends - let winners run
momentum:
  enabled: true
  timeframe: "15m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 22               # Lowered from 25 - catch trends earlier
  volume_surge_multiplier: 1.3    # Lowered from 1.5 - more signals
  atr_period: 14
  atr_stop_multiplier: 1.8        # Tighter stop: 1.8x ATR (was 2.0)
  atr_target_multiplier: 3.5      # Target at 3.5x ATR (still great R:R)
  max_holding_bars: 40            # Max hold 40 bars (10 hours on 15m)
  breakout_lookback: 15           # Shorter lookback = more breakouts detected
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - TSLA
    - NVDA
    - AMD
    - AMZN
    - META
    - GOOGL
    - NFLX
    - BTC-USD
    - ETH-USD
    - SOL-USD

# --- VWAP Scalping ---
# Trade around VWAP like institutional desks
vwap_scalp:
  enabled: true
  timeframe: "1m"
  vwap_bands: 2                   # Number of VWAP standard deviation bands
  entry_band: 1                   # Enter at 1st band
  exit_at_vwap: true              # Exit at VWAP
  min_distance_from_vwap: 0.003   # Min 0.3% from VWAP to enter
  max_distance_from_vwap: 0.015   # Max 1.5% from VWAP
  volume_confirmation: true        # Need volume spike to confirm
  max_trades_per_day: 6           # Limit overtrading
  max_holding_minutes: 30         # Quick scalps only
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD

# --- Pairs Trading (Statistical Arbitrage) ---
# Trade correlated pairs - market neutral
pairs_trading:
  enabled: true
  timeframe: "15m"
  lookback_period: 60             # 60-period correlation window
  min_correlation: 0.80           # Minimum correlation
  entry_zscore: 2.0               # Enter when spread is 2 std devs
  exit_zscore: 0.5                # Exit when spread narrows to 0.5
  stop_zscore: 3.5                # Stop if spread widens to 3.5
  max_holding_bars: 30            # Max hold 30 bars
  pairs:
    - ["AAPL", "MSFT"]
    - ["GOOGL", "META"]
    - ["AMD", "NVDA"]
    - ["XLF", "JPM"]
    - ["SPY", "QQQ"]

# --- SMC Forever Model (ICT / Smart Money Concepts) ---
# Highest-conviction model: stacks liquidity + SMT + CISD + FVG + DOL
# Trades 1-3x per week, A+ setups only
smc_forever:
  enabled: true
  timeframe: "15m"
  swing_lookback: 5                 # Bars each side for swing point detection
  fvg_min_size_pct: 0.001           # Min FVG size as % of price (0.1%)
  smt_lookback: 10                  # Bars to compare for SMT divergence
  displacement_atr_mult: 1.5        # Displacement candle = 1.5x ATR body
  risk_reward_min: 2.0              # Minimum 2:1 R/R or skip
  max_trades_per_week: 3            # Cap weekly trades (selectivity)
  stop_buffer_pct: 0.002            # 0.2% buffer below FVG for stop
  smt_pairs:                        # Correlated pairs for SMT divergence
    - ["SPY", "QQQ"]
    - ["AAPL", "MSFT"]
    - ["NVDA", "AMD"]
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - AMZN
    - META
    - GOOGL
    - TSLA
    - BTC-USD
    - ETH-USD
    - SOL-USD

# --- RVOL Momentum Strategy (Money Machine) ---
# Auto-trades high relative volume stocks like Trade Ideas Money Machine
# Dynamically discovers runners from top movers (not just static watchlist)
rvol_momentum:
  enabled: true
  timeframe: "5m"
  min_rvol: 1.8                    # Lowered from 2.0 - catch more setups
  min_score: 50                    # Lowered from 60 - more aggressive entry
  min_price: 2.00                  # Skip penny stocks below $2
  max_price: 800.00                # Higher cap for big names like NVDA
  min_volume: 150000               # Lowered from 200K - catch mid-caps
  atr_stop_multiplier: 1.5        # Tight stop: 1.5x ATR (momentum = fast exit)
  atr_target_multiplier: 3.0      # Target: 3x ATR (2:1 R/R)
  max_hold_minutes: 120            # Max 2 hours (intraday momentum only)
  max_trades_per_day: 15           # Increased from 12 - more aggressive
  symbols:                         # Base watchlist (dynamic symbols get added automatically)
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - TSLA
    - META
    - AMZN
    - PLTR
    - COIN
    - SMCI
    - ARM
    - CRWD
    - SNOW
    - SOFI
    - HOOD
    - MSTR
    - GOOGL
    - NFLX
    - AVGO
    - MU
    - UBER
    - DKNG
    - RBLX
    - BTC-USD
    - ETH-USD
    - SOL-USD

# --- RVOL Scalp Strategy (1-Minute Quick Breakout) ---
# Ultra-fast scalping on 1-minute bars with real-time profit taking
# Catches quick RVOL breakouts, takes profit on same candle if uptick continues
rvol_scalp:
  enabled: true
  timeframe: "1m"
  min_rvol: 1.5                    # Lowered from 1.8 - catch more scalp setups
  min_score: 45                    # Lowered from 50 - faster entries on momentum
  min_price: 2.00                  # Skip penny stocks below $2
  max_price: 800.00                # Higher cap for big names
  min_volume: 80000                # Lowered from 100K - catch more setups
  atr_stop_multiplier: 1.0        # Very tight stop: 1x ATR
  atr_target_multiplier: 1.5      # Quick target: 1.5x ATR (take profit fast)
  quick_scalp_target_pct: 0.006   # Take profit at +0.6% (faster exits)
  runner_target_pct: 0.015        # Let runners go to +1.5%
  max_hold_minutes: 12             # Max 12 minutes (faster turnover)
  max_trades_per_day: 30           # More scalps per day (was 25)
  same_candle_exit: true           # Exit on same candle if target hit
  price_poll_seconds: 3            # Check price every 3 seconds for exits
  breakout_confirmation_bars: 2    # 2 bars of confirmation before entry
  momentum_acceleration: true      # Detect acceleration (bar-over-bar volume increase)
  symbols:                         # Scans these + all dynamic movers
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - TSLA
    - META
    - AMZN
    - PLTR
    - COIN
    - SMCI
    - ARM
    - CRWD
    - SNOW
    - SOFI
    - HOOD
    - MSTR
    - GOOGL
    - NFLX
    - AVGO
    - MU
    - UBER
    - DKNG
    - RBLX
    - BTC-USD
    - ETH-USD
    - SOL-USD

# --- TradingView Signal Strategy ---
# Execute signals received from TradingView alerts
tradingview_signals:
  enabled: true
  validate_signals: true          # Validate signals against risk rules
  allowed_actions: ["buy", "sell", "close"]
  require_confirmation: false     # No manual confirmation needed (fully auto)
  max_signal_age_seconds: 30      # Ignore signals older than 30 sec
