# --- Short Squeeze Detection Strategy ---
# Finds heavily shorted stocks starting to squeeze
# Edge: 20%+ short interest + rising volume + positive momentum = covering cascade
# Polygon Short Interest data + existing float/volume infrastructure
short_squeeze:
  enabled: true
  timeframe: "5m"
  min_short_pct: 15.0              # Min 15% short interest to float
  min_rvol: 2.0                    # Volume surge confirms covering
  min_score: 55                    # Composite score threshold
  min_price: 1.00                  # $1 floor
  max_price: 100.00                # Catch any squeeze
  min_volume: 100000               # Need liquidity for the squeeze
  max_trades_per_day: 8
  atr_stop_multiplier: 2.0        # Wider stop — squeezes are volatile
  atr_target_multiplier: 6.0      # First target (but trailing handles exit)
  max_hold_days: 5                 # Squeezes are fast
  symbols:
    # Known heavily shorted stocks (scanner adds more dynamically)
    - GME
    - AMC
    - BBBY
    - KOSS
    - CLOV
    - SKLZ
    - WKHS
    - SPCE
    - WISH
    - BB
    - NOK

# --- Post-Earnings Announcement Drift (PEAD) Strategy ---
# Stocks that beat earnings drift in the surprise direction for 20-60 days
# Edge: academic anomaly — small caps with large beats drift the most
# Automatically detects earnings gaps from scanner data
pead:
  enabled: true
  timeframe: "5m"
  min_gap_pct: 5.0                 # Min 5% earnings day gap
  min_rvol: 2.0                    # Confirm institutional interest
  min_score: 55                    # Composite score threshold
  min_price: 2.00                  # $2 floor — some quality required
  max_price: 100.00                # Catch all drifts
  min_volume: 200000               # Need decent liquidity
  max_trades_per_day: 5
  drift_window_days: 30            # Track drift for 30 days post-earnings
  pullback_entry_pct: 0.03         # Enter on 3% pullback from highs
  atr_stop_multiplier: 2.5         # Moderate stop
  max_hold_days: 20                # Ride the drift
  symbols:
    # Auto-detected from scanner gap-ups — these are seed symbols
    - SOFI
    - HOOD
    - IONQ
    - UPST
    - AFRM
    - SOUN
    - AI
    - BBAI
    - RKLB
    - HIMS
    - DKNG

# --- TradingView Signal Strategy ---
# Execute signals received from TradingView alerts
tradingview_signals:
  enabled: true
  validate_signals: true
  allowed_actions: ["buy", "sell", "close"]
  require_confirmation: false
  max_signal_age_seconds: 30
