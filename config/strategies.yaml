# ============================================
# STRATEGY CONFIGURATIONS - EXTREME MOMENTUM
# ============================================
# Two strategies only. Scanner discovers everything dynamically.
# No static symbol lists — let the market tell you what's running.

# --- Strategy Allocation ---
# 60/40 split: RVOL Momentum is the core, Pre-Market Gap catches the openers
allocation:
  smc_forever: 0.00
  mean_reversion: 0.00
  momentum: 0.00
  rvol_momentum: 0.60             # 60% - THE money machine
  rvol_scalp: 0.00                # DISABLED - focus on fewer, bigger trades
  vwap_scalp: 0.00
  pairs_trading: 0.00
  prebreakout: 0.00               # DISABLED - anticipatory, not reactive
  premarket_gap: 0.40             # 40% - biggest day-1 runners come from gaps
  options_momentum: 0.00          # DISABLED - adds complexity
  short_squeeze: 0.00             # DISABLED - consolidate into RVOL momentum
  pead: 0.00                      # DISABLED - slow drift, not extreme momentum

# --- Mean Reversion Strategy ---
mean_reversion:
  enabled: false
  timeframe: "5m"
  lookback_period: 20
  entry_zscore: -2.0
  exit_zscore: 0.0
  rsi_oversold: 28
  rsi_overbought: 72
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5
  max_holding_periods: 15
  max_hold_days: 2
  max_trades_per_day: 10
  symbols: []

# --- Momentum / Trend Following ---
momentum:
  enabled: false
  timeframe: "15m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 22
  volume_surge_multiplier: 1.5
  atr_period: 14
  atr_stop_multiplier: 1.5
  atr_target_multiplier: 5.0
  max_holding_bars: 40
  max_hold_days: 5
  breakout_lookback: 15
  symbols: []

# --- VWAP Scalping ---
vwap_scalp:
  enabled: false
  timeframe: "1m"
  vwap_bands: 2
  entry_band: 1
  exit_at_vwap: true
  min_distance_from_vwap: 0.002
  max_distance_from_vwap: 0.02
  volume_confirmation: true
  max_trades_per_day: 10
  max_holding_minutes: 45
  symbols: []

# --- Pairs Trading ---
pairs_trading:
  enabled: false
  timeframe: "15m"
  lookback_period: 60
  min_correlation: 0.70
  entry_zscore: 1.8
  exit_zscore: 0.3
  stop_zscore: 3.5
  max_holding_bars: 30
  max_hold_days: 5
  pairs:
    - ["AAPL", "MSFT"]

# --- SMC Forever ---
smc_forever:
  enabled: false
  timeframe: "15m"
  swing_lookback: 5
  fvg_min_size_pct: 0.001
  smt_lookback: 10
  displacement_atr_mult: 1.5
  risk_reward_min: 1.5
  max_trades_per_week: 6
  max_hold_days: 10
  stop_buffer_pct: 0.002
  smt_pairs:
    - ["SPY", "QQQ"]
  symbols: []

# --- RVOL Momentum Strategy (Money Machine) ---
# THE CORE STRATEGY - extreme volume + price explosion
# Scanner feeds ALL discovered runners directly — no static watchlist
rvol_momentum:
  enabled: true
  timeframe: "5m"
  min_rvol: 2.5                    # Higher bar: 2.5x relative volume (was 1.5 — too noisy)
  min_score: 60                    # Stronger signals only (was 45 — let too much junk through)
  min_price: 1.00                  # $1 floor — avoid sub-dollar garbage
  max_price: 100.00                # Keep $100 ceiling for mid-cap runners
  min_volume: 100000               # 100K minimum — need real liquidity (was 50K)
  atr_stop_multiplier: 1.5        # Tight stop: 1.5x ATR
  atr_target_multiplier: 4.0      # 4x ATR target
  max_hold_minutes: 180            # Max 3 hours
  max_trades_per_day: 15           # Fewer, higher quality (was 25)
  symbols: []                      # EMPTY — scanner discovers everything

# --- RVOL Scalp Strategy ---
rvol_scalp:
  enabled: false
  timeframe: "1m"
  min_rvol: 2.0
  min_score: 50
  min_price: 1.00
  max_price: 100.00
  min_volume: 100000
  atr_stop_multiplier: 1.0
  atr_target_multiplier: 2.0
  quick_scalp_target_pct: 0.012
  runner_target_pct: 0.025
  max_hold_minutes: 15
  max_trades_per_day: 15
  same_candle_exit: true
  price_poll_seconds: 3
  breakout_confirmation_bars: 2
  momentum_acceleration: true
  symbols: []

# --- Pre-Breakout Accumulation ---
prebreakout:
  enabled: false
  timeframe: "5m"
  min_score: 45
  min_price: 0.50
  max_price: 100.00
  min_volume: 50000
  bollinger_period: 20
  bollinger_std: 2.0
  squeeze_lookback: 50
  squeeze_percentile: 25
  vol_build_bars: 5
  vol_build_multiplier: 1.3
  atr_stop_multiplier: 2.0
  atr_target_multiplier: 6.0
  runner_atr_multiplier: 15.0
  max_hold_days: 5
  max_trades_per_day: 10
  trailing_stop_pct: 0.04
  symbols: []

# --- Pre-Market Gap Scanner Strategy ---
# Catches the biggest gap-ups before open — extreme gaps only
# Scanner feeds dynamically — no static watchlist
premarket_gap:
  enabled: true
  timeframe: "5m"
  min_gap_pct: 0.08               # 8% minimum gap — extreme only (was 4% — too many weak gaps)
  min_rvol: 8.0                   # 8x relative volume — real institutional interest (was 5)
  min_price: 1.00                 # $1 floor
  max_price: 100.00               # Keep $100 ceiling
  min_volume: 50000               # 50K min pre-market volume
  pullback_min_pct: 0.02          # Min 2% pullback
  pullback_max_pct: 0.50          # Max 50% retracement
  atr_stop_multiplier: 1.2        # Tight stop: 1.2x ATR
  atr_target_multiplier: 3.0      # First target at 3x ATR
  runner_atr_multiplier: 10.0     # Runner target at 10x ATR
  max_hold_minutes: 90            # 90 min hold
  max_trades_per_day: 4           # Only the best gaps (was 6)
  max_candidates: 3               # Top 3 gappers only (was 5)
  trailing_stop_pct: 0.03         # 3% trailing stop
  start_hour: 6
  end_hour: 11
  open_dead_zone_minutes: 5       # Skip first 5 min after open
  symbols: []                     # EMPTY — scanner discovers everything

# --- Options Momentum ---
options_momentum:
  enabled: false
  timeframe: "5m"
  min_rvol: 3.0
  min_score: 70
  max_premium_pct: 0.02
  target_dte_min: 10
  target_dte_max: 21
  stop_loss_pct: 0.50
  take_profit_pct: 1.00
  max_options_positions: 3
  max_trades_per_day: 3
  options_universe: []
  symbols: []

# --- Short Squeeze ---
short_squeeze:
  enabled: false
  timeframe: "5m"
  min_short_pct: 15.0
  min_rvol: 2.0
  min_score: 55
  min_price: 1.00
  max_price: 100.00
  min_volume: 100000
  max_trades_per_day: 8
  atr_stop_multiplier: 2.0
  atr_target_multiplier: 6.0
  max_hold_days: 5
  symbols: []

# --- PEAD ---
pead:
  enabled: false
  timeframe: "5m"
  min_gap_pct: 5.0
  min_rvol: 2.0
  min_score: 55
  min_price: 2.00
  max_price: 100.00
  min_volume: 200000
  max_trades_per_day: 5
  drift_window_days: 30
  pullback_entry_pct: 0.03
  atr_stop_multiplier: 2.5
  max_hold_days: 20
  symbols: []

# --- TradingView Signal Strategy ---
tradingview_signals:
  enabled: true
  validate_signals: true
  allowed_actions: ["buy", "sell", "close"]
  require_confirmation: false
  max_signal_age_seconds: 30
