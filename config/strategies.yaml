# ============================================
# STRATEGY CONFIGURATIONS - OPTIMIZED
# ============================================
# Focus: $0.50-$50 high-beta runners for maximum % gains
# Dead weight removed: pairs_trading, vwap_scalp, smc_forever disabled
# Capital reallocated to proven runner-catching strategies

# --- Strategy Allocation ---
# How capital is split across strategies
# Total: 100% across active strategies
allocation:
  smc_forever: 0.00               # DISABLED
  mean_reversion: 0.08            # 8% - dip-buying with reversal confirmation
  momentum: 0.12                  # 12% - swing trades on trending runners (+2% from scalp cut)
  rvol_momentum: 0.30             # 30% - Money Machine, THE core strategy (+5% from scalp cut)
  rvol_scalp: 0.15                # 15% - tightened: fewer trades, wider targets (was 25%)
  vwap_scalp: 0.00                # DISABLED
  pairs_trading: 0.00             # DISABLED
  prebreakout: 0.18               # 18% - catching breakouts before they happen (+3%)
  premarket_gap: 0.17             # 17% - pre-market gap plays with time filter

# --- Mean Reversion Strategy ---
# Dip-buying oversold small/mid caps - buy the panic, sell the recovery
mean_reversion:
  enabled: true
  timeframe: "5m"
  lookback_period: 20             # 20-period lookback
  entry_zscore: -2.0              # Back to -2.0 - only real oversold dips (small caps are noisy)
  exit_zscore: 0.0                # Exit at mean
  rsi_oversold: 28                # Deeper oversold for small caps (more noise = need stronger signals)
  rsi_overbought: 72
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5
  max_holding_periods: 15         # Shorter hold - small caps revert faster or keep dropping
  max_hold_days: 2                # 2 days max - if no revert by then, it's a trend not a dip
  max_trades_per_day: 10          # Fewer trades - quality over quantity for mean reversion
  symbols:
    # $0.50-$50 stocks that dip hard but recover (high beta, liquid enough)
    - SOFI
    - HOOD
    - IONQ
    - MARA
    - RIOT
    - SOUN
    - LCID
    - RIVN
    - AFRM
    - UPST
    - SNAP
    - PLUG
    - DNA
    - OPEN
    - WISH
    - SKLZ
    - CLSK
    - JOBY
    - GSAT

# --- Momentum / Trend Following ---
# Ride strong trends on small/mid cap runners
momentum:
  enabled: true
  timeframe: "15m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 22               # Slightly higher - small caps need confirmed trends (less noise)
  volume_surge_multiplier: 1.5    # Higher volume requirement - confirm institutional flow
  atr_period: 14
  atr_stop_multiplier: 1.5        # Tight stop: 1.5x ATR
  atr_target_multiplier: 5.0      # Wider target: 5x ATR for runners (was 4x)
  max_holding_bars: 40
  max_hold_days: 5                # 5 days max - runners move fast
  breakout_lookback: 15
  symbols:
    # $0.50-$100 trending stocks with momentum potential
    # Scanner dynamically adds more — these are the core watchlist
    - SOFI
    - HOOD
    - IONQ
    - MARA
    - RIOT
    - SOUN
    - AFRM
    - UPST
    - RIVN
    - LCID
    - SNAP
    - SKLZ
    - AI
    - BBAI
    - RKLB
    - LUNR
    - ASTS
    - CLSK
    - RGTI
    - GME
    - AMC
    - GSAT
    - DNA
    - OPEN
    - WOLF        # Semiconductors, volatile
    - HIMS        # Telehealth, runner potential
    - IOVA        # Biotech, FDA catalysts
    - VKTX        # Obesity drug play, volatile
    - RIG         # Offshore energy, momentum
    - DKNG        # Sports betting, volatile

# --- VWAP Scalping ---
# DISABLED - VWAP scalping requires highly liquid large caps ($100+) with tight spreads
# Small caps have erratic VWAP and wide spreads that eat scalp profits
vwap_scalp:
  enabled: false
  timeframe: "1m"
  vwap_bands: 2
  entry_band: 1
  exit_at_vwap: true
  min_distance_from_vwap: 0.002
  max_distance_from_vwap: 0.02
  volume_confirmation: true
  max_trades_per_day: 10
  max_holding_minutes: 45
  symbols:
    - SPY
    - QQQ

# --- Pairs Trading (Statistical Arbitrage) ---
# DISABLED - Requires short selling which is blocked by long_only=true
# Also requires correlated large-cap pairs - wrong universe for $0.50-$50
pairs_trading:
  enabled: false
  timeframe: "15m"
  lookback_period: 60
  min_correlation: 0.70
  entry_zscore: 1.8
  exit_zscore: 0.3
  stop_zscore: 3.5
  max_holding_bars: 30
  max_hold_days: 5
  pairs:
    - ["AAPL", "MSFT"]

# --- SMC Forever Model (ICT / Smart Money Concepts) ---
# DISABLED - Requires liquid large caps for reliable liquidity sweeps and FVGs
# Small caps don't have clean enough order flow for SMC patterns
smc_forever:
  enabled: false
  timeframe: "15m"
  swing_lookback: 5
  fvg_min_size_pct: 0.001
  smt_lookback: 10
  displacement_atr_mult: 1.5
  risk_reward_min: 1.5
  max_trades_per_week: 6
  max_hold_days: 10
  stop_buffer_pct: 0.002
  smt_pairs:
    - ["SPY", "QQQ"]
  symbols:
    - SPY

# --- RVOL Momentum Strategy (Money Machine) ---
# THE CORE STRATEGY - finds stocks with unusual volume and rides the momentum
# Dynamically discovers runners from Polygon scanner (not just static watchlist)
rvol_momentum:
  enabled: true
  timeframe: "5m"
  min_rvol: 1.5                    # Lowered to 1.5x - catch catalyst-driven movers early (was 2.0)
  min_score: 45                    # Lowered for fast path - snapshot signals miss RSI/EMA/MACD pts (was 55)
  min_price: 0.50                  # Match global $0.50 floor
  max_price: 100.00                # Raised to $100 - catch mid-cap runners like VKTX, TDW (was $50)
  min_volume: 50000                # 50K minimum - catch early movers before volume ramps (was 100K)
  atr_stop_multiplier: 1.5        # Tight stop: 1.5x ATR (momentum = fast exit)
  atr_target_multiplier: 4.0      # 4x ATR target
  max_hold_minutes: 180            # Max 3 hours - give runners more time to develop (was 120)
  max_trades_per_day: 25           # 25 trades/day - more aggressive (was 20)
  symbols:
    # $0.50-$100 high-beta runners (dynamic scanner adds more)
    # Core watchlist — scanner discovers the rest dynamically
    - SOFI
    - HOOD
    - IONQ
    - MARA
    - RIOT
    - SOUN
    - AFRM
    - UPST
    - AI
    - BBAI
    - RKLB
    - LUNR
    - ASTS
    - RIVN
    - LCID
    - CLSK
    - RGTI
    - GME
    - AMC
    - SNAP
    - SKLZ
    - RBLX
    - GSAT
    - DNA
    - OPEN
    - WOLF        # Semiconductors
    - HIMS        # Telehealth runner
    - IOVA        # Biotech, FDA catalysts
    - VKTX        # Obesity drug play
    - RIG         # Offshore energy
    - DKNG        # Sports betting

# --- RVOL Scalp Strategy (1-Minute Quick Breakout) ---
# Ultra-fast scalping on 1-minute bars - the volume machine
# Catches quick RVOL breakouts, takes profit on same candle if uptick continues
rvol_scalp:
  enabled: true
  timeframe: "1m"
  min_rvol: 2.0                    # Lowered to catch more setups (was 2.5)
  min_score: 50                    # Lowered - more aggressive entry (was 60)
  min_price: 1.00                  # $1 floor — catch low-priced runners (was $2)
  max_price: 100.00                # Raised to $100 — catch mid-cap momentum (was $50)
  min_volume: 100000               # 100K min — more accessible (was 200K)
  atr_stop_multiplier: 1.0        # Tight stop: 1x ATR
  atr_target_multiplier: 2.0      # Wider target: 2x ATR (was 1.5 — too tight)
  quick_scalp_target_pct: 0.012   # Take profit at +1.2% (was 0.6% — inside the spread)
  runner_target_pct: 0.025        # Runners to +2.5% (was 2%)
  max_hold_minutes: 15             # Max 15 minutes (was 10)
  max_trades_per_day: 15           # Quality over quantity (was 35)
  same_candle_exit: true
  price_poll_seconds: 3
  breakout_confirmation_bars: 2
  momentum_acceleration: true
  symbols:
    # $0.50-$50 high-volume stocks for scalping
    # COIN, SMCI, MSTR REMOVED - above $50 price range
    - SOFI
    - HOOD
    - IONQ
    - MARA
    - RIOT
    - SOUN
    - AFRM
    - UPST
    - AI
    - BBAI
    - RKLB
    - LUNR
    - ASTS
    - RIVN
    - LCID
    - CLSK
    - RGTI
    - GME
    - AMC
    - SNAP
    - SKLZ
    - RBLX
    - GSAT
    - DNA
    - OPEN

# --- Pre-Breakout Accumulation Strategy ---
# Enters BEFORE the breakout by detecting accumulation:
# BB squeeze + volume building + higher lows + MACD shift
# These are the multi-bagger plays - enter during compression, ride the explosion
prebreakout:
  enabled: true
  timeframe: "5m"
  min_score: 45                    # Lowered - catch more accumulation setups (was 50)
  min_price: 0.50                  # Match global $0.50 floor
  max_price: 100.00                # Raised to $100 to catch mid-cap breakouts (was $50)
  min_volume: 50000                # 50K min - catch early accumulation (was 75K)
  bollinger_period: 20
  bollinger_std: 2.0
  squeeze_lookback: 50
  squeeze_percentile: 25           # Tighter squeeze detection - stronger setups
  vol_build_bars: 5
  vol_build_multiplier: 1.3        # Higher vol requirement - confirm accumulation
  atr_stop_multiplier: 2.0
  atr_target_multiplier: 6.0       # 6x ATR first target
  runner_atr_multiplier: 15.0      # 15x ATR runner target (multi-bagger potential)
  max_hold_days: 5                 # 5 days max
  max_trades_per_day: 10
  trailing_stop_pct: 0.04          # 4% trailing stop (wider - survive small cap shakeouts)
  symbols:
    # $0.50-$50 high-beta stocks that make breakout moves
    # COIN, SMCI, MSTR REMOVED - above $50 price range
    - SOFI
    - HOOD
    - IONQ
    - MARA
    - RIOT
    - SOUN
    - AFRM
    - UPST
    - AI
    - BBAI
    - RKLB
    - LUNR
    - ASTS
