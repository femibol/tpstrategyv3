  atr_target_multiplier: 4.0      # Wider target: 4x ATR (was 3x - let runners go)
  max_hold_minutes: 180            # Max 3 hours (was 2 - give momentum time to play out)
  max_trades_per_day: 25           # 25 trades/day (was 18 - this is the money machine)
