# --- Pre-Breakout Accumulation Strategy ---
# Enters BEFORE the breakout by detecting accumulation:
# BB squeeze + volume building + higher lows + MACD shift
# Then enters on the first breakout candle for maximum runner potential
# Catches plays like RXT (+227%), GERN (+7.8%) by entering early
prebreakout:
  enabled: true
  timeframe: "5m"
  min_score: 45                    # Lower threshold (was 50 - catch more breakouts)
  min_price: 0.50                  # Low price OK - these are where big % moves happen
  max_price: 1500.00               # Higher cap (was $800 - don't miss expensive runners)
  min_volume: 75000                # Lower volume (was 100K - catch early-stage runners)
  bollinger_period: 20             # BB period
  bollinger_std: 2.0               # BB standard deviations
  squeeze_lookback: 50             # Bars to compare for squeeze detection
  squeeze_percentile: 30           # Wider squeeze detection (was 25% - catch more setups)
  vol_build_bars: 5                # Recent bars to measure volume buildup
  vol_build_multiplier: 1.2        # Lower vol requirement (was 1.3x - earlier detection)
  atr_stop_multiplier: 2.0         # Stop at 2x ATR below (room to breathe)
  atr_target_multiplier: 6.0       # First target at 6x ATR (was 5x - bigger targets)
  runner_atr_multiplier: 15.0      # Runner target at 15x ATR (was 10x - full send on runners)
  max_hold_days: 7                 # Hold up to 7 days (was 5 - give breakouts time to develop)
  max_trades_per_day: 12           # Max 12 breakout entries (was 8 - catch more setups)
  trailing_stop_pct: 0.035         # 3.5% trailing stop (was 3% - wider to survive shakeouts)
  symbols:
    # High-beta stocks that make big breakout moves
    - TSLA
    - NVDA
    - AMD
