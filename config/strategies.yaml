# --- RVOL Scalp Strategy (1-Minute Quick Breakout) ---
# Ultra-fast scalping on 1-minute bars with real-time profit taking
# Catches quick RVOL breakouts, takes profit on same candle if uptick continues
rvol_scalp:
  enabled: true
  timeframe: "1m"
  min_rvol: 1.8                    # Back to 1.8 (crypto 0.7x = 1.26x effective, was 1.05x = noise)
  min_score: 50                    # Back to 50 (crypto 0.8x = 40 effective, was 36 = too loose)
  min_price: 2.00                  # Skip penny stocks below $2
  max_price: 800.00                # Higher cap for big names
  min_volume: 80000                # Lowered from 100K - catch more setups
  atr_stop_multiplier: 1.0        # Very tight stop: 1x ATR
  atr_target_multiplier: 1.5      # Quick target: 1.5x ATR (take profit fast)
  quick_scalp_target_pct: 0.004   # Take profit at +0.4% (even quicker - high frequency)
  runner_target_pct: 0.015        # Runners to +1.5% (let strong ones go further)
  max_hold_minutes: 8              # Max 8 minutes (even faster turnover)
  max_trades_per_day: 50           # 50 scalps/day (was 35 - this is the volume machine)
  same_candle_exit: true           # Exit on same candle if target hit
  price_poll_seconds: 3            # Check price every 3 seconds for exits
  breakout_confirmation_bars: 2    # 2 bars of confirmation before entry
  momentum_acceleration: true      # Detect acceleration (bar-over-bar volume increase)
