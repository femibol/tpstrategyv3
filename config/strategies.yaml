# ============================================
# STRATEGY CONFIGURATIONS
# ============================================

# --- Strategy Allocation ---
# How capital is split across strategies
allocation:
  smc_forever: 0.08               # 8% - highest conviction but only 3 trades/week (was 12%)
  mean_reversion: 0.10            # 10% - reliable on crypto + equities (was 8%)
  momentum: 0.08                  # 8% - swing trades, slower timeframe (was 10%)
  rvol_momentum: 0.18             # 18% - Money Machine RVOL, crypto-tuned (was 15%)
  rvol_scalp: 0.25                # 25% - Best performer, 24/7 crypto capable (was 20%)
  vwap_scalp: 0.05                # 5% - market hours only, 6 symbols (was 8%)
  pairs_trading: 0.08             # 8% - adding crypto pairs (was 12%)
  prebreakout: 0.18               # 18% - crypto-tuned breakout detection (was 15%)

# --- Mean Reversion Strategy ---
# Buy oversold, sell overbought - bread & butter for small accounts
mean_reversion:
  enabled: true
  timeframe: "5m"
  lookback_period: 20             # 20-period lookback
  entry_zscore: -1.8              # Lowered from -2.0 - catch more reversals
  exit_zscore: 0.0                # Exit at mean
  rsi_oversold: 32                # Lowered from 35 - crypto needs deeper oversold for real reversals
  rsi_overbought: 72              # Slightly more room for crypto momentum
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5         # Min volatility filter
  max_holding_periods: 20         # Max hold 20 bars (100 min on 5m)
  max_hold_days: 3                # Mean reversion: max 3 days to revert
  max_trades_per_day: 15          # More mean reversion trades (was 10)
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - NVDA
    - AMD
    - BTC-USD
    - ETH-USD
    - SOL-USD
    - DOGE-USD
    - AVAX-USD
    - LINK-USD
    - XRP-USD
    - ADA-USD
    - MATIC-USD
    - SHIB-USD
    - PEPE-USD
    - DOT-USD
    - UNI-USD
    - LTC-USD
    - NEAR-USD
    - AAVE-USD

# --- Momentum / Trend Following ---
# Ride strong trends - let winners run
momentum:
  enabled: true
  timeframe: "15m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 20               # Even lower (was 22) - catch trends earliest
  volume_surge_multiplier: 1.2    # Even lower (was 1.3) - more signals on crypto
  atr_period: 14
  atr_stop_multiplier: 1.5        # Tighter stop: 1.5x ATR (was 1.8 - faster cut)
  atr_target_multiplier: 4.0      # Wider target: 4x ATR (was 3.5 - let winners ride)
  max_holding_bars: 40            # Max hold 40 bars (10 hours on 15m)
  max_hold_days: 7                # Swing: hold up to 7 trading days (was 5 - catch week-long moves)
  breakout_lookback: 15           # Shorter lookback = more breakouts detected
  symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - TSLA
    - NVDA
    - AMD
    - AMZN
    - META
    - GOOGL
    - NFLX
    - BTC-USD
    - ETH-USD
    - SOL-USD
    - DOGE-USD
    - AVAX-USD
    - LINK-USD
    - XRP-USD
    - ADA-USD
    - MATIC-USD
    - SHIB-USD
    - PEPE-USD
    - DOT-USD
    - UNI-USD
    - LTC-USD
    - NEAR-USD
    - AAVE-USD

# --- VWAP Scalping ---
# Trade around VWAP like institutional desks
vwap_scalp:
  enabled: true
  timeframe: "1m"
  vwap_bands: 2                   # Number of VWAP standard deviation bands
  entry_band: 1                   # Enter at 1st band
  exit_at_vwap: true              # Exit at VWAP
  min_distance_from_vwap: 0.002   # Min 0.2% from VWAP (was 0.3% - catch tighter bounces)
  max_distance_from_vwap: 0.02    # Max 2% from VWAP (was 1.5% - catch bigger deviations)
  volume_confirmation: true        # Need volume spike to confirm
  max_trades_per_day: 10          # More VWAP trades (was 6)
  max_holding_minutes: 45         # Longer hold (was 30 min - let mean reversion work)
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD

# --- Pairs Trading (Statistical Arbitrage) ---
# Trade correlated pairs - market neutral
pairs_trading:
  enabled: true
  timeframe: "15m"
  lookback_period: 60             # 60-period correlation window
  min_correlation: 0.70           # Lower correlation (was 0.80 - more pairs qualify)
  entry_zscore: 1.8               # Enter earlier (was 2.0 - catch more divergences)
  exit_zscore: 0.3                # Tighter exit (was 0.5 - squeeze more profit from convergence)
  stop_zscore: 3.5                # Stop if spread widens to 3.5
  max_holding_bars: 30            # Max hold 30 bars
  max_hold_days: 5                # Pairs: max 5 days for convergence
  pairs:
    - ["AAPL", "MSFT"]
    - ["GOOGL", "META"]
    - ["AMD", "NVDA"]
    - ["XLF", "JPM"]
    - ["SPY", "QQQ"]
    # Crypto pairs (trade 24/7 - high correlation)
    - ["BTC-USD", "ETH-USD"]      # Strongest crypto correlation
    - ["SOL-USD", "AVAX-USD"]     # L1 competitors
    - ["LINK-USD", "UNI-USD"]     # DeFi infrastructure
    - ["DOGE-USD", "SHIB-USD"]    # Meme coins move together

# --- SMC Forever Model (ICT / Smart Money Concepts) ---
# Highest-conviction model: stacks liquidity + SMT + CISD + FVG + DOL
# Trades 1-3x per week, A+ setups only
smc_forever:
  enabled: true
  timeframe: "15m"
  swing_lookback: 5                 # Bars each side for swing point detection
  fvg_min_size_pct: 0.001           # Min FVG size as % of price (0.1%)
  smt_lookback: 10                  # Bars to compare for SMT divergence
  displacement_atr_mult: 1.5        # Displacement candle = 1.5x ATR body
  risk_reward_min: 1.5              # Lower R:R (was 2.0 - take more setups)
  max_trades_per_week: 6            # Double weekly trades (was 3 - don't leave money on table)
  max_hold_days: 10                  # SMC setups: hold up to 10 days (was 7 - let big moves play out)
  stop_buffer_pct: 0.002            # 0.2% buffer below FVG for stop
  smt_pairs:                        # Correlated pairs for SMT divergence
    - ["SPY", "QQQ"]
    - ["AAPL", "MSFT"]
    - ["NVDA", "AMD"]
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - AMZN
    - META
    - GOOGL
    - TSLA
    - BTC-USD
    - ETH-USD
    - SOL-USD
    - DOGE-USD
    - AVAX-USD
    - LINK-USD
    - XRP-USD
    - ADA-USD
    - MATIC-USD
    - SHIB-USD
    - PEPE-USD
    - DOT-USD
    - UNI-USD
    - LTC-USD
    - NEAR-USD
    - AAVE-USD

# --- RVOL Momentum Strategy (Money Machine) ---
