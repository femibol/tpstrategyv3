# --- Pre-Market Gap Scanner Strategy ---
# Finds extreme pre-market gap-ups, waits for pullback, enters on structure break
# This is where the biggest day 1 runners come from
premarket_gap:
  enabled: true
  timeframe: "5m"
  min_gap_pct: 0.04               # Lowered to 4% gap - catch more gaps (was 5%)
  min_rvol: 5.0                   # Lowered from 8x - catch gaps earlier before volume builds
  min_price: 0.50                 # Match global $0.50 floor
  max_price: 100.00               # Raised to $100 (was $50)
  min_volume: 30000               # 30K min pre-market volume - early gaps have thin volume (was 50K)
  pullback_min_pct: 0.02          # Min 2% pullback
  pullback_max_pct: 0.50          # Max 50% retracement
  atr_stop_multiplier: 1.2        # Tight stop: 1.2x ATR
  atr_target_multiplier: 3.0      # First target at 3x ATR
  runner_atr_multiplier: 10.0     # Runner target at 10x ATR (bigger for gap plays)
  max_hold_minutes: 90             # 90 min hold (was 60 - let morning momentum play out)
  max_trades_per_day: 6
  max_candidates: 5                # Top 5 gappers (was 3 - more opportunities)
  trailing_stop_pct: 0.03          # 3% trailing stop (wider for volatile gap plays)
  start_hour: 6
  end_hour: 11                    # Extended to 11 AM (was 10 - catch late morning runners)
  open_dead_zone_minutes: 5       # Skip first 5 min after 9:30 open (whipsaw/fakeout zone)
