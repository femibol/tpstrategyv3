# ============================================
# STRATEGY CONFIGURATIONS - AGGRESSIVE MOMENTUM RUNNER
# ============================================
# Momentum runner is the primary strategy: 3 entry types, 10-pt scoring,
# session-aware scanning, 4-phase ATR trailing stop.
# RVOL + Gap + Pre-breakout retained as secondary strategies.

# --- Strategy Allocation ---
allocation:
  smc_forever: 0.00
  mean_reversion: 0.15             # 15% — earns in sideways markets (regime detector scales up to 1.4x automatically)
  momentum: 0.15                   # 15% — broadest trend-following strategy, catches what others miss
  momentum_runner: 0.30            # 30% — PRIMARY: aggressive runner catching (3 entry types, 7 slots)
  rvol_momentum: 0.10             # 10% - Money machine backup (snapshot fast path)
  rvol_scalp: 0.05                # 5% - Quick scalps on high-RVOL movers (premarket + regular)
  vwap_scalp: 0.00
  pairs_trading: 0.00
  prebreakout: 0.10               # 10% - enter BEFORE the breakout (accumulation detection, multi-bagger setups)
  premarket_gap: 0.05             # 5% - pre-market gap plays
  options_momentum: 0.00
  short_squeeze: 0.00
  pead: 0.00
  daily_trend_rider: 0.15           # 15% — swing trades on multi-day runners
  low_float_catalyst: 0.05          # 5% — micro-cap catalyst runners (GOVX/VRAX/SBFM-style), reserved 5-slot pool
  crypto_runner: 0.04               # 4% — live crypto pump catcher (WLD/DRIFT/JTO-style intraday moves)

# --- Mean Reversion Strategy ---
# Earns in sideways markets when momentum strategies idle.
# Regime detector gives mean_reversion a 1.4x multiplier in SIDEWAYS,
# and 0.5x in CRISIS — so allocation is dynamic, not fixed.
mean_reversion:
  enabled: true
  timeframe: "5m"
  lookback_period: 20
  entry_zscore: -1.5             # Was -2.0. Z-score -2.0 was too strict for normal sideways noise — rarely fired.
  exit_zscore: 0.0
  rsi_oversold: 32               # Was 28. Loosened in tandem with zscore so oversold conditions trigger more often.
  rsi_overbought: 68             # Symmetric loosen from 72
  entry_zscore_crypto: -1.0      # Was -1.2 (code default). 14h of 24/7 BTC/ETH/SOL chop produced zero fires.
  rsi_oversold_crypto: 40        # Was 45 (code default). Loosened alongside zscore for the same reason.
  rsi_overbought_crypto: 55      # Code default — left as-is; symmetric short trigger.
  # Crypto-only trend gate. Skip mean-reversion entries on alts that have been
  # flat or down over the recent past. Trade review of 163 crypto closes
  # (2026-05-15 → 2026-05-24) found NEAR carried +$522 of the +$436 book while
  # ICP/DOT/BCH/LINK/SUI/AVAX/LTC bled –$200; a trend filter cleanly separates.
  # Lookback is 3 days, not 14, because `_fetch_binance_us_klines` caps at 1000
  # 5m bars (≈3.5d) per request (market_data.py:350) — the cache literally
  # cannot deliver longer history without pagination. Backtest at 3d/+10% is
  # equivalent to 14d/+2% on the May 15–24 sample (both keep +$540-ish, both
  # filter every losing symbol). See HANDOFF for the planned pagination follow-up.
  crypto_trend_filter_enabled: true
  crypto_trend_lookback_bars: 864    # 3d × 24h × 12 bars/h on 5m (within the 1000-bar Binance cap)
  crypto_trend_min_pct: 0.05         # require ≥ +5% over the lookback window (was +10%, too strict in flat tape — live diag 2026-05-27 showed 33-36/42 names blocked at 10% with strongest at ICP +9.9% / GRT +8.7% / TIA +7.7%; per HANDOFF session 8 pre-approved fallback)
  bollinger_period: 20
  bollinger_std: 2.0
  min_atr_multiplier: 1.5
  max_holding_periods: 15
  max_hold_days: 2
  max_trades_per_day: 10
  symbols: []

# --- Momentum / Trend Following ---
# Broadest strategy: EMA crossover + ADX + volume surge. Works in any market
# condition where individual stocks are trending, even if SPY is flat.
momentum:
  enabled: true
  timeframe: "5m"
  fast_ema: 8
  slow_ema: 21
  signal_ema: 5
  adx_threshold: 35                # Raised 20→35 (conservative dial 2026-05-18). 20 caught chop labeled as trend; 35 is the classic "strong trend" floor. Runner setups have ADX 50+ so this doesn't filter them.
  volume_surge_multiplier: 1.3
  atr_period: 14
  atr_stop_multiplier: 1.5
  atr_target_multiplier: 5.0
  max_holding_bars: 40
  max_hold_days: 5
  breakout_lookback: 15
  symbols:
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - META
    - TSLA
    - AMZN
    - GOOGL
    - NFLX
    - PLTR
    - COIN
    - SOFI
    - RIOT
    - MARA
    - SQ
    - SHOP
    - SNAP
    - UBER
    - RKLB
    - SMCI

# --- VWAP Scalping ---
vwap_scalp:
  enabled: false
  timeframe: "1m"
  vwap_bands: 2
  entry_band: 1
  exit_at_vwap: true
  min_distance_from_vwap: 0.002
  max_distance_from_vwap: 0.02
  volume_confirmation: true
  max_trades_per_day: 10
  max_holding_minutes: 45
  symbols: []

# --- Pairs Trading ---
pairs_trading:
  enabled: false
  timeframe: "15m"
  lookback_period: 60
  min_correlation: 0.70
  entry_zscore: 1.8
  exit_zscore: 0.3
  stop_zscore: 3.5
  max_holding_bars: 30
  max_hold_days: 5
  pairs:
    - ["AAPL", "MSFT"]

# --- SMC Forever ---
smc_forever:
  enabled: false
  timeframe: "15m"
  swing_lookback: 5
  fvg_min_size_pct: 0.001
  smt_lookback: 10
  displacement_atr_mult: 1.5
  risk_reward_min: 1.5
  max_trades_per_week: 6
  max_hold_days: 10
  stop_buffer_pct: 0.002
  smt_pairs:
    - ["SPY", "QQQ"]
  symbols: []

# --- MOMENTUM RUNNER STRATEGY (PRIMARY) ---
# Aggressive runner catcher with 3 entry types and 10-pt scoring.
# Session-aware: pre-market, regular hours, post-market.
# 4-phase ATR-based trailing stop (managed by engine).
# Unified scoring: RVOL(0-3) + Float(0-2) + Catalyst(0-2) + Technical(0-3) = 10
# Only trades candidates scoring 6+/10.
momentum_runner:
  enabled: true
  timeframe: "1m"                    # 1-minute bars for fastest detection
  min_score: 6                       # 6/10 minimum composite score
  min_price: 0.20                    # Penny tier admitted (was $1); pairs with risk.min_price=0.20
  max_price: 100.00                  # $100 ceiling
  min_volume: 500000                 # 500K avg daily volume — real liquidity only
  max_daily_change_pct: 30.0         # Skip >30% unless fresh catalyst
  max_open_positions: 7              # Max 7 momentum runner positions (up from 5, uses 10-slot capacity)
  max_trades_per_day: 15             # More shots on goal (up from 10)
  atr_stop_multiplier: 1.0           # 1x ATR(14) initial stop
  spike_size_pct: 0.50               # 50% position size for spike entries
  open_dead_zone_minutes: 2          # 2-min dead zone after open (chaos period)
  afternoon_reduction_hour: 15       # 3:00 PM ET — reduce size
  afternoon_size_reduction: 0.50     # 50% size after 3 PM (EOD reversals)
  symbols: []                        # EMPTY — scanner discovers everything

# --- RVOL Momentum Strategy (Money Machine) ---
# Secondary strategy — snapshot fast-path for instant signal generation
rvol_momentum:
  enabled: true
  timeframe: "5m"
  min_rvol: 3.0                    # Raised from 1.5 (conservative dial 2026-05-18). Matches premarket gate; runner days clear 5-10x RVOL trivially.
  min_score: 60                    # Raised from 40 → classical "good setup" bar.
  min_price: 1.00                  # $1 floor
  max_price: 100.00                # $100 ceiling
  min_volume: 300000               # Lowered from 500K — captures more mid-cap movers
  atr_stop_multiplier: 1.5        # Tight stop: 1.5x ATR
  atr_target_multiplier: 4.0      # 4x ATR target
  max_hold_minutes: 180            # Max 3 hours
  max_trades_per_day: 8            # Reduced — momentum_runner is primary
  symbols: []                      # EMPTY — scanner discovers everything

# --- RVOL Scalp Strategy ---
rvol_scalp:
  enabled: true
  timeframe: "1m"
  min_rvol: 3.0                    # Raised from 1.5 (conservative dial 2026-05-18). Scalps need extreme RVOL to overcome friction; weaker setups bleed to cost.
  min_score: 70                    # Raised from 40 → high bar for short-hold trades.
  min_price: 1.00
  max_price: 100.00
  min_volume: 100000
  atr_stop_multiplier: 1.0
  atr_target_multiplier: 2.0
  quick_scalp_target_pct: 0.012
  runner_target_pct: 0.025
  max_hold_minutes: 15
  max_trades_per_day: 15
  same_candle_exit: true
  price_poll_seconds: 3
  breakout_confirmation_bars: 2
  momentum_acceleration: true
  symbols: []

# --- Pre-Breakout Accumulation ---
# Enter BEFORE the explosion: detect BB squeeze + volume building + higher lows
# Scanner discovers candidates dynamically — no static list
prebreakout:
  enabled: true
  timeframe: "5m"
  min_score: 50                    # Moderate bar — catch accumulation early
  min_price: 0.20                  # Penny tier admitted (was $1)
  max_price: 100.00
  min_volume: 75000                # 75K — need some liquidity
  bollinger_period: 20
  bollinger_std: 2.0
  squeeze_lookback: 50
  squeeze_percentile: 20           # Tighter squeeze = higher conviction
  vol_build_bars: 5
  vol_build_multiplier: 1.4        # Stronger volume build required
  atr_stop_multiplier: 1.5         # Tighter stop (was 2.0) — if it doesn't explode, get out
  atr_target_multiplier: 6.0       # 6x ATR first target
  runner_atr_multiplier: 15.0      # 15x ATR for multi-baggers
  max_hold_days: 3                 # Shorter hold — explode or bail (was 5)
  max_trades_per_day: 8
  trailing_stop_pct: 0.02          # 2% trail (was 4% — tighter for aggressive system)
  symbols: []                      # EMPTY — scanner discovers everything

# --- Pre-Market Gap Scanner Strategy ---
# Catches the biggest gap-ups before open — extreme gaps only
# Scanner feeds dynamically — no static watchlist
premarket_gap:
  enabled: true
  timeframe: "5m"
  min_gap_pct: 0.04               # 4% minimum gap — lowered from 8% to catch more setups in paper
  min_rvol: 3.0                   # 3x relative volume — lowered from 8x for paper mode
  min_price: 1.00                 # $1 floor
  max_price: 100.00               # Keep $100 ceiling
  min_volume: 50000               # 50K min pre-market volume
  pullback_min_pct: 0.02          # Min 2% pullback
  pullback_max_pct: 0.50          # Max 50% retracement
  atr_stop_multiplier: 1.2        # Tight stop: 1.2x ATR
  atr_target_multiplier: 3.0      # First target at 3x ATR
  runner_atr_multiplier: 10.0     # Runner target at 10x ATR
  max_hold_minutes: 90            # 90 min hold
  max_trades_per_day: 4           # Only the best gaps (was 6)
  max_candidates: 3               # Top 3 gappers only (was 5)
  trailing_stop_pct: 0.03         # 3% trailing stop
  start_hour: 4                  # Match premarket start (4 AM ET)
  end_hour: 11
  open_dead_zone_minutes: 5       # Skip first 5 min after open
  symbols: []                     # EMPTY — scanner discovers everything

# --- Options Momentum ---
options_momentum:
  enabled: false
  timeframe: "5m"
  min_rvol: 3.0
  min_score: 70
  max_premium_pct: 0.02
  target_dte_min: 10
  target_dte_max: 21
  stop_loss_pct: 0.50
  take_profit_pct: 1.00
  max_options_positions: 3
  max_trades_per_day: 3
  options_universe: []
  symbols: []

# --- Short Squeeze ---
short_squeeze:
  enabled: false
  timeframe: "5m"
  min_short_pct: 15.0
  min_rvol: 2.0
  min_score: 55
  min_price: 1.00
  max_price: 100.00
  min_volume: 100000
  max_trades_per_day: 8
  atr_stop_multiplier: 2.0
  atr_target_multiplier: 6.0
  max_hold_days: 5
  symbols: []

# --- PEAD ---
pead:
  enabled: false
  timeframe: "5m"
  min_gap_pct: 5.0
  min_rvol: 2.0
  min_score: 55
  min_price: 2.00
  max_price: 100.00
  min_volume: 200000
  max_trades_per_day: 5
  drift_window_days: 30
  pullback_entry_pct: 0.03
  atr_stop_multiplier: 2.5
  max_hold_days: 20
  symbols: []

# --- Daily Trend Rider ---
# Swing strategy: ride multi-day momentum in liquid stocks.
# Holds overnight by design (own bucket, separate from intraday overnight cap).
# Entry: daily green streak + SuperTrend bullish + ADX>25 + intraday pullback.
# Exit: daily close below SuperTrend or 20 EMA, or momentum exhaustion.
daily_trend_rider:
  enabled: true
  timeframe: "1d"                   # Uses daily bars for scanning, 5-min for entry
  min_price: 10.00                  # $10+ only — need stable, liquid stocks
  max_price: 500.00                 # Avoid stocks too expensive for meaningful sizing
  min_avg_volume: 1000000           # 1M avg daily volume — liquid enough for market orders
  min_green_days: 3                 # 3-day run-up — filters out 2-day noise; raise to 4-5 for stricter quality
  ema_period: 20                    # Daily 20 EMA — trend floor
  adx_threshold: 20                 # Lowered from 25 — more setups qualify in sideways markets
  supertrend_period: 7              # SuperTrend(7,3) — the main trend indicator
  supertrend_multiplier: 3.0        # SuperTrend ATR multiplier
  atr_period: 14                    # ATR(14) for stop calculation
  atr_stop_multiplier: 1.5          # Stop at 1.5x daily ATR from entry
  max_hold_days: 20                 # Safety cap — exit if held > 20 days regardless
  max_positions: 3                  # Max 3 trend riders simultaneously (own overnight bucket)
  entry_pullback_pct: 0.02          # Pullback to within 2% of 9 EMA for entry
  rotation_score_ratio: 1.25        # When at capacity, swap weakest if new candidate scores ≥1.25× higher
  rotation_min_hold_days: 1         # Don't rotate a position that's been held < 1 day (prevents thrash)
  symbols: []                       # Empty — uses dynamically discovered symbols from IBKR scanner

# --- Low-Float Catalyst Strategy ---
# Micro-cap catalyst runners (GOVX/VRAX/SBFM/WGRX-class names).
# Asymmetric upside, accepts higher per-trade loss probability. Server-side
# bracket at entry (hard stop, hard target) — no trailing, no partials.
# Engine flushes any open positions at 09:25 ET (open-dip dodge); re-entry
# from 09:35+ if conditions still hold.
low_float_catalyst:
  enabled: true
  min_price: 0.20
  max_price: 10.00
  max_float_m: 75.0                 # Catches GOVX 2.9M, VRAX 19.6M, SBFM 4.9M, WGRX 62.7M
  min_rvol: 5.0                     # 5x average volume — catalyst already firing
  max_spread_pct: 0.03              # Reject anything wider than 3% spread
  min_day_change_pct: 15.0          # Today's move ≥ 15% — confirmed catalyst, not pre-speculation
  hard_stop_pct: 0.08               # -8% server-side stop, no trailing
  hard_target_pct: 0.20             # +20% server-side target
  max_hold_minutes: 30              # 30-min time stop
  max_trades_per_day: 8             # Cap daily attempts
  open_dead_zone_start_min: 25      # No new entries 9:25-9:35 (open chop)
  open_dead_zone_end_min: 35
  require_known_float: true         # Reject if Finviz fetch failed (safer default)
  max_position_pct: 0.05            # ~$1.2K @ $24K account
  symbols: []                       # Uses scanner-injected dynamic symbols only

# --- TradingView Signal Strategy ---
tradingview_signals:
  enabled: true
  validate_signals: true
  allowed_actions: ["buy", "sell", "close"]
  require_confirmation: false
  max_signal_age_seconds: 30

# --- Crypto Runner Strategy ---
# Live crypto pump catcher. Mirrors low_float_catalyst's "hard stop, hard TP,
# time stop, no trail" shape, on crypto. Pairs with the CoinGecko dynamic
# universe + new_entrants scanner signal — new entrants get a relaxed
# 1h-change floor (default 0.5x) so we don't miss the first 30 min of a run.
# See bot/strategies/crypto_runner.py.
crypto_runner:
  enabled: true
  min_1h_change_pct: 5.0            # 5% in the last 60 min — pump already in motion
  min_rvol: 3.0                     # 3x on the latest 5-min bar vs prior 10
  hard_stop_pct: 0.06               # -6% server-managed stop
  hard_target_pct: 0.15             # +15% target (TP/stop ratio = 2.5x)
  max_hold_minutes: 240             # 4h time stop
  max_trades_per_day: 8
  max_position_pct: 0.04            # ~$960 @ $24K account, tight initial cap
  new_entrant_threshold_mult: 0.5   # New entrants halve the 1h floor (e.g. 2.5%)
  require_new_entrant: false        # Set true to ONLY trade new entrants (strict mode)
  symbols: []                       # Uses crypto universe injected by engine
