# ============================================
# ALGO TRADING BOT - MAIN CONFIGURATION
# ============================================

# --- Trading Mode ---
# scalp = Quick trades, tight stops, intraday only
# swing = Multi-day holds, medium stops, trend following
# hybrid = Scalp + swing: quick intraday profits AND multi-day holds
# invest = Longer holds, wide stops, follow smart money
trading_profile: hybrid

# --- Capital & Account ---
capital:
  starting_balance: 47000         # Synced to real Alpaca paper account (overridden on startup)
  max_portfolio_risk: 0.20        # Max 20% of capital at risk (was 10% - deploy more)
  max_daily_loss: 0.04            # Stop trading if down 4% (~$1,880) - protect capital (was 6% too risky)
  max_drawdown: 0.12              # Emergency stop at 12% from peak (~$5,640) - tighter protection (was 18%)
  reserve_cash_pct: 0.10          # 10% cash reserve (~$4,700) - always have dry powder for runners

# --- Risk Management ---
risk:
  long_only: true                   # Only allow bullish (buy) entries - matches TradersPost setting
  max_position_size_pct: 0.25     # Max 25% of capital per position (~$11.7K) - fewer, bigger bets
  max_positions: 6                # Max 6 concurrent positions - focused firepower (was 12, spread too thin)
  max_equity_positions: 6         # Max 6 equity positions
  max_crypto_positions: 0         # Crypto paused
  risk_per_trade_pct: 0.03        # Risk 3% per trade (~$1,410) - fewer trades, bigger conviction (was 2%)
  max_correlated_positions: 2     # Max 2 in same sector - stay diversified across runners
  stop_loss_pct: 0.03             # 3% stop loss - small caps need slightly wider stops (was 2.5%)
  trailing_stop_pct: 0.02         # 2% trailing stop - wider for volatile small caps (was 1.4%)
  take_profit_pct: 999.0          # NO CAP — trailing stop is the only exit for winners. Runners ride to 50-400%+
  max_slippage_pct: 0.008         # Max 0.8% slippage - small caps have wider spreads (was 0.5%)

  # --- Profit Taking (Partial Exits) ---
  # Optimized: let winners run LONGER, take smaller partials, wider trails
  # Problem before: closing 25% at +3% leaves money on the table for 20%+ runners
  profit_taking:
    enabled: true
    # NO HARD CEILING — partials lock in gains, trailing stop rides the rest forever
    # After all partials: ~40% of original position still riding with trail protection
    targets:
      - pct_from_entry: 0.05      # At +5% profit - first partial
        close_pct: 0.15           # Close 15% - keep 85% riding
        move_stop: "breakeven"    # Move stop to break even (risk-free from here)
      - pct_from_entry: 0.10      # At +10% profit
        close_pct: 0.15           # Close 15% of remaining (~13% of original)
        tighten_trail: 0.03       # 3% trail
      - pct_from_entry: 0.25      # At +25% profit
        close_pct: 0.15           # Close 15% of remaining
        tighten_trail: 0.035      # 3.5% trail — wider for volatile runners
      - pct_from_entry: 0.50      # At +50% profit - confirmed monster runner
        close_pct: 0.20           # Close 20% of remaining — lock in big gains
        tighten_trail: 0.05       # 5% trail — give monster room to breathe
      # Remaining ~40% of shares ride with dynamic trailing stop (no ceiling)
      # Trail widens at extreme levels: 6% at 100%+, 8% at 200%+

  # --- Break Even Stop ---
  breakeven:
    enabled: true
    trigger_pct: 0.015            # Move stop to BE after 1.5% profit (wider for volatile small caps)
    buffer_pct: 0.002             # 0.2% buffer above entry (wider for small cap spreads)
  min_volume: 100000              # 100K volume threshold - need real liquidity for extreme momentum
  min_price: 1.00                 # Floor: $1.00 — no sub-dollar junk
  scanner_max_price: 100.00       # Scanner discovers movers under $100
  # No hard ceiling — bot rides runners past $100 if uptrend is confirmed

  # --- Portfolio-Level Risk Limits ---
  # Prevents concentrated bets, runaway exposure, and unmanaged positions
  portfolio_limits:
    max_single_name_pct: 0.25       # HARD CEILING: No single position > 25% of net liquidation
    max_gross_exposure_pct: 1.50    # Max 150% gross exposure (longs + |shorts|) / net liq
    max_net_exposure_pct: 1.00      # Max 100% net exposure (longs - |shorts|) / net liq
    max_loss_per_position_pct: 0.08 # Force-close any position down > 8% from entry
    monitor_all_broker_positions: true  # Track ALL broker positions (including shorts) for risk monitoring

# --- Trading Schedule ---
schedule:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  pre_market_scan: "09:15"       # Scan 15 min before open
  avoid_first_minutes: 5          # 5 min buffer - let opening volatility settle, avoid fakeouts (was 2)
  avoid_last_minutes: 10          # 10 min before close - exit positions, avoid EOD dump
  trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

  # --- Pre-market / Extended Hours ---
  premarket:
    enabled: true                  # Pre-market trading enabled (catches gap plays)
    start_time: "06:00"           # Start earlier at 6 AM (was 7 AM - catch early movers)
    allowed_strategies: ["rvol_momentum", "premarket_gap"]
    reduce_size_pct: 0.70         # Use 70% of normal size

  postmarket:
    enabled: true                  # Post-market trading enabled (catch after-hours moves)
    end_time: "20:00"             # Trade until 8 PM ET (was 6 PM - catch earnings reactions)
    allowed_strategies: ["rvol_momentum"]
    reduce_size_pct: 0.60         # Use 60% size

  # --- Overnight Holding ---
  overnight:
    enabled: true                  # Allow holding overnight
    require_profit: true           # Only hold if position is in profit
    min_profit_pct: 0.02           # Min 2% profit to hold overnight (small caps gap down hard)
    require_uptrend: true          # Only hold if in uptrend (EMA fast > slow)
    tighten_stop_pct: 0.025       # 2.5% tight stop for overnight (small caps gap)
    max_overnight_positions: 3    # Max 3 overnight - small caps are risky overnight
    close_losers: true            # Always close losing positions at EOD

# --- Scaling Plan ---
# Bot auto-adjusts as account grows
scaling:
  enabled: true
  # Aggressive deployment — use available capital, don't sit on cash
  # Position % stays high at all tiers so the bot actually deploys money
  tiers:
    - min_balance: 5000
      max_positions: 3
      risk_per_trade: 0.03
      max_position_pct: 0.35       # ~$1,750 max per position
    - min_balance: 10000
      max_positions: 4
      risk_per_trade: 0.03
      max_position_pct: 0.30       # ~$3,000 max per position
    - min_balance: 25000
      max_positions: 5
      risk_per_trade: 0.03
      max_position_pct: 0.25       # ~$6,250 max per position
    - min_balance: 50000
      max_positions: 6
      risk_per_trade: 0.03
      max_position_pct: 0.25       # ~$12,500 max per position
    - min_balance: 100000
      max_positions: 8
      risk_per_trade: 0.03
      max_position_pct: 0.20       # ~$20K max per position
    - min_balance: 250000
      max_positions: 10
      risk_per_trade: 0.03
      max_position_pct: 0.20       # ~$50K max per position

# --- Hedging ---
# Automatic portfolio protection via inverse ETFs during bearish regimes
hedging:
  enabled: false                     # DISABLED - hedging with inverse ETFs conflicts with small cap runner strategy
  auto_hedge: false                  # Small caps already drop hard in bear markets - just reduce position count
  max_hedge_pct: 0.15
  instruments: ["SH", "SDS", "PSQ", "SQQQ"]

# --- Weekly Watchlist ---
# Symbols actively monitored each week. Auto-includes politician picks.
watchlist:
  # NO static watchlist — scanner discovers extreme momentum dynamically
  symbols: []
  auto_add_politician_picks: false  # Disabled — pure scanner-driven
  track_weekly_performance: true    # Track weekly P&L per symbol

# --- Crypto Configuration ---
# PAUSED: All capital redirected to equities for more stock positions
crypto:
  enabled: false                  # PAUSED - focusing all capital on equities
  symbols_suffix: ["-USD", "-USDT", "-BTC", "-ETH"]  # How we detect crypto tickers
  schedule:
    trading_24h: false            # Disabled - no 24/7 trading
    trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
  risk:
    max_position_size_pct: 0.12
    stop_loss_pct: 0.04
    trailing_stop_pct: 0.025

# --- Data Sources ---
data:
  primary: "ibkr"                 # Primary: IBKR (real-time streaming + historical bars)
  fallback: "polygon"             # Fallback: Polygon.io (scanning + prices + bars)
  fallback2: "yfinance"           # Last resort: yfinance
  bar_size: "5 mins"              # 5-minute bars for swing/momentum strategies
  scalp_bar_size: "1 min"         # 1-minute bars for RVOL scalp strategy
  lookback_days: 30               # Historical data lookback
  price_poll_interval: 3          # Poll prices every 3 seconds for scalp exits
  cache_ttl: 10                   # 10-second cache TTL (was 30s, too slow for scalps)

# --- Execution ---
execution:
  order_type: "limit"             # limit orders only (no market orders)
  limit_offset_pct: 0.003         # Place limit 0.3% from current price (wider for small cap spreads)
  retry_attempts: 3
  retry_delay_seconds: 5
  use_vwap: true                  # Use VWAP for better entries
  partial_fills: true             # Accept partial fills
  time_in_force: "DAY"            # Day orders only

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_size_mb: 50
  backup_count: 10
  log_trades: true
  log_signals: true
  log_risk_checks: true
