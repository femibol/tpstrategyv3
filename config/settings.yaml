# ============================================
# ALGO TRADING BOT - MAIN CONFIGURATION
# ============================================

# --- Trading Mode ---
# scalp = Quick trades, tight stops, intraday only
# swing = Multi-day holds, medium stops, trend following
# hybrid = Scalp + swing: quick intraday profits AND multi-day holds
# invest = Longer holds, wide stops, follow smart money
trading_profile: hybrid

# --- Capital & Account ---
capital:
  starting_balance: 25000          # Fallback only — bot syncs real balance from IBKR on startup
  max_portfolio_risk: 0.20        # Max 20% of capital at risk (was 10% - deploy more)
  max_daily_loss: 0.04            # Stop trading if down 4% (~$1,880) - protect capital (was 6% too risky)
  max_drawdown: 0.12              # Emergency stop at 12% from peak (~$5,640) - tighter protection (was 18%)
  reserve_cash_pct: 0.10          # 10% cash reserve (~$4,700) - always have dry powder for runners

# --- Risk Management ---
# Aligned with aggressive momentum runner spec:
# 1% risk per trade, max 5 momentum positions, 500K volume floor
risk:
  long_only: true                   # Only allow bullish (buy) entries - matches TradersPost setting
  max_position_size_pct: 0.20     # Max 20% of capital per position — spec: concentrated but controlled
  max_positions: 18               # 10 normal (6 equity + 4 crypto budget) + 5 reserved low_float + 3 reserved penny_runner
  max_equity_positions: 6         # Per-class sub-cap; 4 slots always reserved for crypto when equity fills
  max_crypto_positions: 6         # Per-class sub-cap; 4 slots always reserved for equity when crypto fills
  max_low_float_positions: 5      # Reserved pool for low_float_catalyst — high-asymmetry catalyst plays only
  max_penny_runner_positions: 3   # Reserved pool for low-priced squeeze plays (YMAT $0.23→$2.30, BRAI $8→$15)
  penny_runner_price_min: 0.20    # Pool entry floor — below this is too illiquid even for squeezes
  penny_runner_price_max: 15.00   # Pool entry ceiling — covers BRAI-style $8 starts that run to $15+
  penny_runner_max_position_size_pct: 0.05   # Per-position cap: 5% of capital (vs 20% normal) — small bets, lottery-ticket math
  penny_runner_stop_loss_pct: 0.06           # 6% initial stop — wider than 3% std to accommodate volatility, tight enough to bound loss
  penny_runner_trailing_stop_pct: 0.08       # 8% trailing — ride spikes without choking on normal pullbacks (vs 1.5% std)
  risk_per_trade_pct: 0.01        # Risk 1% per trade (~$470) — spec: never risk more than 1%
  kelly_max_mult: 2.0             # Per-strategy Kelly ceiling — full aggression: a proven strategy sizes up to 2.0x base (capped at 2% by the risk ceiling)
  # Per-strategy ABSOLUTE dollar ceiling on risk-per-trade. Applied AFTER all
  # multiplicative sizing (Kelly/DD/Session) so it's the final cap. Resolves
  # asymmetries where one bad entry wipes a week of small wins. See
  # bot/risk/position_sizer.py __init__ for the mean_reversion / NEAR-USD
  # rationale (PR #197). Empty dict = disabled for all strategies.
  max_dollar_risk_per_strategy:
    # Tier 1 restructure 2026-06-09 — cap aligned to 30d track record.
    # Proven engines unthrottled, unproven ones held back, bleeders capped tight.
    mean_reversion: 150           # 2026-07 review: was $100. Crypto MR is the only proven
                                  # engine — PF 1.53-1.80 across 7 weeks, +$837 total. Raised
                                  # 50% so the edge compounds. At a 5% crypto stop this sizes
                                  # ~$3,000 notional (was ~$2,000, tier-capped to ~$1,050 for
                                  # sub-$1 coins before the crypto tier-cap exemption).
    rvol_momentum: 50             # neutral cap — 7 trades, near breakeven, needs more data
    momentum_runner: 50           # neutral — silent so far; cap small until track record exists
    prebreakout: 50               # ditto
    premarket_gap: 50             # ditto
    low_float_catalyst: 40        # asymmetric bet pattern — already small by design, hold the line
    crypto_runner: 30             # bracket -6% stop, tight cap matches the small position thesis
    # 2026-06-11: momentum + rvol_scalp re-enabled with tight caps after
    # 6/11 day showed momentum CAN earn (+$170 on DAIC/LABX/RDWU lane).
    # Class filter + slippage floor neutralize the catastrophic single-trade
    # tail. The cap bounds the day-to-day damage from regular stop-outs.
    momentum: 50                  # historically -$500/30d but 6/11 was +$170 — cap, don't kill
    rvol_scalp: 40                # HIBS killer in place; cap belt-and-suspenders for the 14% WR profile

  # Per-strategy risk FLOOR (2026-07-10). The $150 mean_reversion ceiling
  # above never engaged: per-strategy Kelly computes NEGATIVE for the
  # many-small-wins profile (payoff ratio < 1 → Kelly f < 0 despite +$838
  # net over 8 weeks), pinning kelly_mult at 0.25x → ~$50 effective risk.
  # A ceiling above a Kelly-floored value is inert; this floor is the lever
  # that actually raises spend on the proven engine. Bounded in code by the
  # 2%-of-balance hard ceiling. ONLY set floors for strategies with a long
  # profitable track record — a floor on a bleeder scales the bleed.
  min_dollar_risk_per_strategy:
    mean_reversion: 100           # 2x current effective ($50). ~$2-2.5K notional at a 4-5% crypto stop.

  # Time-of-day equity dead zones (2026-06-09 audit). Hours in ET (24h).
  # Block new equity BUY signals during these windows — the bot consistently
  # loses money in them per 30d data:
  #   05:00-06:00 ET  →  premarket dead zone, slippage_reject pattern, -$203
  #   14:00-15:00 ET  →  early afternoon lunch lull, -$133
  # The 09:30-10:30 open hour stays OPEN — it's where most legit runners fire,
  # even though WR is mixed.
  # Crypto bypasses this filter entirely (24/7 universe).
  equity_dead_hours_et: [5, 14]
  # 2026-06-05: switch to MARKET-parent server brackets on equity. IBKR
  # paper account lacks Top-of-Book subs for NASDAQ/NYSE/BATS/ARCA, so
  # LIMIT brackets sit in PendingSubmit until the bot's 15s timeout kills
  # them. MARKET parents skip the price validation and actually fill.
  # Trade-off: worse fills on micro-cap runners. Per-fill slippage is
  # logged at bot/brokers/ibkr.py (BRACKET FILLED line includes signal
  # vs fill price). Flip to false when market-data permissions are
  # restored to get tighter fills back.
  use_market_orders_on_bracket: true
  # SMART-routing bypass. 2026-06-05 incident: every regular-session
  # bracket sat in PendingSubmit until 15s timeout cancelled it. Root
  # cause: SMART router needs real-time market-data subscriptions on the
  # underlying exchanges (BATS/NASDAQ/ARCA/NYSE) to validate liquidity.
  # The Error 2152 dump shows we DO have IEX subs, so route there
  # directly. Premarket orders (which use outside_rth and bypass SMART)
  # were filling fine — this is RTH-specific.
  # Set to "SMART" to restore old behavior once data subs are added.
  ibkr_routing_exchange: "IEX"
  max_universe_symbols: 90        # Cap on symbols given a bar refresh per cycle — positions+crypto always kept, equity-discovery tail trimmed (keeps update_data fast so position monitoring isn't blocked)
  max_correlated_positions: 2     # Max 2 in same sector - stay diversified across runners
  stop_loss_pct: 0.03             # 3% stop loss fallback
  trailing_stop_pct: 0.015        # 1.5% trailing stop — aggressive, ratchets up every 3 seconds
  take_profit_pct: 999.0          # NO CAP — trailing stop is the only exit for winners
  max_slippage_pct: 0.008                  # Post-fill RTH: fill within 0.8% of signal (BUY: adverse direction only — fills below signal are a discount, not slippage)
  max_slippage_pct_extended: 0.015         # Post-fill extended hours: 1.5% — thinner books, catalyst-driven moves routinely fill 0.5–1% past signal
  max_spread_pct: 0.02                     # Max 2% bid-ask spread — reject illiquid names BEFORE placing order
  max_signal_deviation_pct: 0.05           # Pre-order RTH: signal-vs-live drift cap (5% matches risk_manager.Rule 6)
  max_signal_deviation_pct_extended: 0.12  # Pre-order extended hours: 12% — pre-market gappers routinely drift 8-12%

  # Server-side bracket default for equity entries. When true, equity BUYs
  # are routed as LIMIT @ price×1.02 so IBKR attaches a bracket order
  # (stop + target on broker side). Survives bot/gateway disruptions —
  # without this, in-memory stops can fail to reach IBKR when the worker
  # is wedged (DELL incident 2026-05-30: position uncovered for hours
  # because BROKER STOP UPDATE FAILED in a retry loop while the worker
  # timed out at 180s on every call). Crypto signals stay False (executed
  # via TradersPost webhook which doesn't support IBKR brackets).
  # Strategies can still override per-signal via `use_server_bracket` field.
  # Set to false to revert to the old in-memory-stop behavior.
  use_server_bracket_equity_default: true

  # Stale pending-SELL cancellation. At IBKR sync (boot + periodic resync),
  # cancel any pending SELL order that has sat in "Submitted"/"PreSubmitted"
  # state longer than this. Prevents the DELL incident pattern (2026-06-01):
  # bracket STOP leg placed Sunday night at $313.88 sat unfilled because
  # IBKR's price cap blocked the limit; sync skipped DELL on every restart
  # for ~24h because "has pending SELL order". 2h is conservative — typical
  # legitimate exits fill in seconds, anything older than 2h is stuck.
  stale_pending_sell_max_hours: 2.0

  # IBKR scanner location code. Was hard-coded `STK.US.MAJOR` in
  # `bot/brokers/ibkr.py:scan_market` until 2026-06-18 when a live audit
  # showed 8 of 9 same-day Yahoo top gainers (ICCM +200%, SNBR +121%,
  # EHGO +119%, SDOT, YMAT, QURE, FTHM, ELTX — all NASDAQ-listed) had
  # ZERO scanner hits. The 50-row TOP_PERC_GAIN response was saturated by
  # bigger-cap movers; small-cap NASDAQ runners fell off the list.
  # Broadening to `STK.US` (all US equities including OTC/Pink) gives
  # the scanner more headroom; downstream filters (min_price, RVOL,
  # score, max_float, leveraged-ETF class filter) still enforce quality.
  # Set back to "STK.US.MAJOR" if OTC garbage floods the universe.
  # Other valid codes: STK.US.NASDAQ, STK.US.NYSE, STK.US.AMEX.
  scanner_location: "STK.US"

  # === Below moved from `cost_model:` to `risk:` on 2026-06-18. ===========
  # `Config().risk_config` reads from settings["risk"]; engine code consistently
  # asks `risk_config.get("<key>", <default>)`. Keys nested under `cost_model:`
  # silently fell back to the hardcoded code defaults — three behavior drifts
  # we caught: strategy_daily_dd_pause_pct (code 0.03 vs YAML 0.05),
  # min_volume (code 50000 vs YAML 200000), and profit_taking (code disabled
  # vs YAML 9-tier ladder). Tests in `tests/test_risk_yaml_nesting_all.py`
  # pin every key here so the indentation slip can't recur.
  # =======================================================================

  # --- New-entry safety gates (block buys, never block exits) ---
  max_total_trades_per_day: 25      # Hard cap on equity entries per day across all strategies (0 = disabled)
  max_total_crypto_trades_per_day: 50  # Separate cap for crypto — 24/7 market needs more headroom than RTH equity (0 = disabled)
  strategy_daily_dd_pause_pct: 0.05 # If a strategy is down >5% on its allocated capital today, pause its new entries until tomorrow (0 = disabled). Raised 3%→5% 2026-05-28 after RKLB -$82.56 overnight tripped momentum at -4.15% and killed the whole RTH session — one bad trade nuked the bot's primary equity strategy for the day. 5% lets momentum absorb a single overnight slip and keep trying instead of compounding into a dead day.
  premarket_news_check: true        # 6 AM ET sweep over overnight holds — close at open if a bearish catalyst dropped overnight

  # --- Universe / scanner filters ---
  min_volume: 200000              # 200K floor so sub-$3 low-float runners (RPGL, FCHL, BIYA tier) get through. Spread-safety still enforced per-strategy.
  min_price: 0.50                 # Floor: $0.50 — admits proper low-floats while excluding true penny junk
  scanner_max_price: 500.00       # Raised from $100 — top gainers scanner needs this to catch mid/large-cap runners. Bot rides runners past $500 if uptrend is confirmed
  falling_knife_pct: -5.0         # Block longs on stocks down >5% on the day — don't buy falling knives (WAL pattern)

  # --- AGGRESSIVE Profit Taking (Intra-Candle Partials) ---
  # Checked every 3 seconds on every tick — not candle-close.
  # 10 tiers starting at 0.5% — lock in gains EARLY, let runners run later.
  # Trailing stop ratchets up on every price tick for the remaining shares.
  # This is optimized for momentum stocks that reverse fast.
  profit_taking:
    enabled: true
    # `targets` is the CRYPTO ladder (and the fallback if equity_targets is
    # unset). Crypto mean-reversion oscillates fast — banking at +0.5%/+1%
    # is correct there (PF 1.53 across 7 weeks proves it).
    #
    # `equity_targets` (2026-07 review fix): equity momentum designs 2:1 R/R
    # trades but the sub-+2.5% tiers + early breakeven realized only 0.43:1
    # — winners chopped into ~$1.82 partials, losers full-size to -$25 stops
    # (position-level: 38% WR, avgW $11.57 vs $44 needed). Equity now takes
    # NO partials below +2.5% and arms breakeven at +2.5% (first tier) /
    # +2% (standalone check below), letting winners reach 1.5-2R first.
    equity_targets:
      - pct_from_entry: 0.025      # At +2.5% — first partial, real profit
        close_pct: 0.10            # Close 10%
        move_stop: "breakeven"     # Risk-free from here
      - pct_from_entry: 0.04       # At +4% — strong move
        close_pct: 0.10
        tighten_trail: 0.02        # 2% trail (looser than crypto's 1.5%)
      - pct_from_entry: 0.07       # At +7% — trending
        close_pct: 0.10
        tighten_trail: 0.025
      - pct_from_entry: 0.12       # At +12% — runner confirmed
        close_pct: 0.10
        tighten_trail: 0.03
      - pct_from_entry: 0.20       # At +20% — big winner
        close_pct: 0.10
        tighten_trail: 0.035
      - pct_from_entry: 0.35       # At +35% — monster
        close_pct: 0.10
        tighten_trail: 0.04
      - pct_from_entry: 0.60       # At +60% — extreme runner
        close_pct: 0.08
        tighten_trail: 0.05
    targets:
      - pct_from_entry: 0.005      # At +0.5% — scalp the first move
        close_pct: 0.08            # Close 8%
      - pct_from_entry: 0.01       # At +1% — small gain locked
        close_pct: 0.08            # Close 8%
      - pct_from_entry: 0.015      # At +1.5% — immediate breakeven lock
        close_pct: 0.10            # Close 10%
        move_stop: "breakeven"     # Risk-free from here
      - pct_from_entry: 0.025      # At +2.5% — real profit
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.012       # 1.2% trail
      - pct_from_entry: 0.04       # At +4% — strong move
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.015       # 1.5% trail
      - pct_from_entry: 0.07       # At +7% — trending
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.02        # 2% trail
      - pct_from_entry: 0.12       # At +12% — runner confirmed
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.025       # 2.5% trail
      - pct_from_entry: 0.20       # At +20% — big winner
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.03        # 3% trail — give runner room
      - pct_from_entry: 0.35       # At +35% — monster
        close_pct: 0.10            # Close 10%
        tighten_trail: 0.04        # 4% trail
      - pct_from_entry: 0.60       # At +60% — extreme runner
        close_pct: 0.08            # Close 8%
        tighten_trail: 0.05        # 5% trail — ride it
      # Remaining ~16% rides with dynamic trailing stop (no ceiling)
      # Trail widens at extreme levels: 6% at 100%+, 8% at 200%+

  # --- Velocity-Based Quick Exits ---
  # Price spikes (e.g. 1% in 30 seconds) trigger instant partial takes.
  # Momentum stocks reverse fast — grab profits before the reversal.
  velocity_exits:
    enabled: true
    fast_spike_pct: 0.015        # 1.5% move within window → take partial
    fast_spike_window_sec: 45    # Within 45 seconds
    fast_spike_close_pct: 0.25   # Take 25% off the table
    # Momentum reversal: significant retracement from high = trim hard
    reversal_retrace_pct: 0.30   # HWM drops 30% = trim
    reversal_close_pct: 0.40     # Take 40% off on reversal

  # --- Break Even Stop ---
  breakeven:
    enabled: true
    trigger_pct: 0.01             # Move stop to BE after just 1% profit — lock it in fast (crypto)
    equity_trigger_pct: 0.02      # 2026-07 review: equity momentum pulls back 1% routinely —
                                  # BE at +1% guaranteed near-flat finishes. Equity arms at +2%.
    buffer_pct: 0.005             # 0.5% buffer above entry — gives room for normal noise without getting stopped out

  # --- Portfolio-Level Risk Limits ---
  # Prevents concentrated bets, runaway exposure, and unmanaged positions
  portfolio_limits:
    max_single_name_pct: 0.25       # HARD CEILING: No single position > 25% of net liquidation
    max_gross_exposure_pct: 1.50    # Max 150% gross exposure (longs + |shorts|) / net liq
    max_net_exposure_pct: 1.00      # Max 100% net exposure (longs - |shorts|) / net liq
    max_loss_per_position_pct: 0.08 # Force-close any position down > 8% from entry
    monitor_all_broker_positions: true  # Track ALL broker positions (including shorts) for risk monitoring

  # --- Blocked Symbols ---
  # Inverse and leveraged ETFs that appear as "gainers" but are directionally
  # wrong for a long-only momentum bot (going long SQQQ = betting against
  # Nasdaq). Also includes crypto pairs the bot has structurally lost on —
  # gate enforced in `_execute_signal` (engine.py:5918) so dynamic-scanner
  # injection can't sneak them back in. NOTE 2026-06-18: this list was
  # previously mis-nested under `cost_model:` due to an indentation slip,
  # making it invisible to the engine (`risk.blocked_symbols → None`). Three
  # leveraged ETFs (SOXL -$65, JNUG -$46, TZA -$22) traded through unblocked
  # before the move-back. If you add new tickers, KEEP THIS UNDER `risk:`.
  blocked_symbols:
    - "SQQQ"   # 3x inverse Nasdaq
    - "TQQQ"   # 3x leveraged Nasdaq (extreme slippage risk)
    - "SOXS"   # 3x inverse semiconductors
    - "SOXL"   # 3x leveraged semiconductors
    - "SPXS"   # 3x inverse S&P 500
    - "SPXU"   # 3x inverse S&P 500
    - "SDOW"   # 3x inverse Dow
    - "LABD"   # 3x inverse biotech
    - "LABU"   # 3x leveraged biotech
    - "UVXY"   # 1.5x leveraged VIX
    - "SVXY"   # 0.5x inverse VIX
    - "VIXY"   # VIX short-term futures
    - "UVIX"   # 2x leveraged VIX
    - "SH"     # 1x inverse S&P 500
    - "TZA"    # 3x inverse small-cap (-$22 on 2026-05-18 premarket momo, trail bug + wrong-direction)
    - "TNA"    # 3x leveraged small-cap (paired with TZA — both inverse pairs blocked)
    # Crypto blacklist — these symbols re-entered today via dynamic scanner
    # injection even though removed from the static crypto.symbols list.
    - "BCH-USD"  # 3/3 losses today, -$63 — single worst symbol; high ATR vs entry size
    - "FIL-USD"  # 1/4 win, -$20 today (combined with -$20 historical)
    - "SDS"    # 2x inverse S&P 500
    - "PSQ"    # 1x inverse Nasdaq
    - "QID"    # 2x inverse Nasdaq
    - "DOG"    # 1x inverse Dow
    - "DXD"    # 2x inverse Dow
    - "SRTY"   # 3x inverse Russell 2000
    - "FAZ"    # 3x inverse financials
    - "ERY"    # 2x inverse energy
    - "DUST"   # 2x inverse gold miners
    - "GDXD"   # 2x inverse gold miners
    - "JDST"   # 2x inverse junior gold miners
    - "YANG"   # 3x inverse China
    - "DRIP"   # 2x inverse S&P Oil & Gas E&P
    - "WEBS"   # 3x inverse Dow
    - "HIBS"   # 3x inverse high beta — bled -$375 in 5s on 2026-06-05 (slippage_reject below stop_loss)
    # Added 2026-06-05 — companions to the above + leveraged variants
    # that whipsaw faster than the bot's exit logic can react.
    - "HIBL"   # 3x leveraged high beta
    - "EDZ"    # 3x inverse emerging markets — lost -$47.70 today (2026-06-05)
    - "EDC"    # 3x leveraged emerging markets
    - "GUSH"   # 2x leveraged S&P Oil & Gas E&P
    - "YINN"   # 3x leveraged China
    - "DRN"    # 3x leveraged real estate
    - "DRV"    # 3x inverse real estate
    - "NUGT"   # 2x leveraged junior gold miners
    - "JNUG"   # 2x leveraged junior gold miners (-$46 on 2026-06-15, this bug)
    - "ERX"    # 2x leveraged energy
    - "TECS"   # 3x inverse technology
    - "TECL"   # 3x leveraged technology
    - "FNGD"   # 3x inverse FANG+
    - "FNGU"   # 3x leveraged FANG+
    - "BNKD"   # 3x inverse banks
    - "BNKU"   # 3x leveraged banks
    - "TSLL"   # 2x leveraged Tesla — 2026-06-09 open position flagged for blocking
    - "TSLZ"   # 2x inverse Tesla (paired block)
    - "TSLQ"   # 1.5x inverse Tesla
    - "TSLS"   # 1x inverse Tesla
    - "NVDL"   # 2x leveraged NVIDIA
    - "NVD"    # 2x inverse NVIDIA

# Cost-vs-edge gate (RiskManager Rule 6.5). Rejects entries whose
# take_profit edge can't clear estimated round-trip cost by ratio×.
# Ratio-based so cheap-stock momentum scalps with big % moves still
# pass even when absolute bps cost looks scary.
# Claude pre-trade hard gate. OFF by default — every signal that passes the
# deterministic risk_manager + safety gates goes straight to the broker
# without an AI veto. Live log analysis (2026-05-27) found the gate skipping
# 100% of equity signals (267 SKIPs, 0 PROCEEDs in one session) because the
# WR rule was reading dirty historical data: 6 of momentum's 10 "losses"
# were `slippage_reject` artifacts already fixed in `2ec2325`, plus pre-fix
# trail wicks fixed in `e6fcc34`. AI value lives in the batch paths instead
# (auto-tuner crons, weekly review, post-trade insights every 5 trades) —
# those stay on. Flip `enabled: true` to re-enable the hard gate.
ai_pretrade:
  enabled: false

cost_model:
  enabled: true
  equity_fee_bps: 2.0           # IBKR Pro round-trip avg on order sizes this bot runs
  crypto_fee_bps: 30.0          # TradersPost → Alpaca crypto taker ~15bp × 2 sides
  equity_spread_bps_default: 5.0
  crypto_spread_bps_default: 10.0
  spread_mult: 2.0              # Multiplier on configured spread to capture cross-spread + slippage
  min_edge_cost_ratio: 2.0      # take_profit edge must be ≥ 2× round-trip cost (equity default)
  # Crypto-specific ratio. Crypto edges are structurally smaller per trade
  # than equity momentum runners — 1-2% moves are common on majors. The 2×
  # equity gate was rejecting cleanly-oversold crypto setups at 66-78 bps
  # of real edge (live audit 2026-06-22: GRT-USD Z=-2.33 / Vol=12.2x, MATIC
  # Z=-2.09 / Vol=8.2x — both rejected). Drop to 1.5× so crypto entries
  # need ≥ 75 bps over a ~50 bp round-trip; the floor still excludes the
  # 36 bp setups that were the safety margin. Equity stays at 2.0×.
  crypto_min_edge_cost_ratio: 1.5
# Everything that was nested here from 2026-06-18 backwards (profit_taking,
# velocity_exits, breakeven, portfolio_limits, blocked_symbols, etc.) has
# moved back under `risk:` where the engine actually reads it.

# --- Trading Schedule ---
schedule:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  pre_market_scan: "04:00"       # Scan at 4 AM ET — full pre-market coverage
  avoid_first_minutes: 2          # 2-min dead zone — spec: no entries within 2 min of open
  avoid_last_minutes: 10          # 10 min before close - exit positions, avoid EOD dump
  trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

  # --- Pre-market / Extended Hours ---
  premarket:
    enabled: true                  # Pre-market trading enabled (catches gap plays)
    start_time: "04:00"           # 4 AM ET — full pre-market coverage per spec
    allowed_strategies: ["momentum_runner", "rvol_momentum", "premarket_gap", "momentum", "rvol_scalp", "low_float_catalyst"]
    reduce_size_pct: 0.50         # Use 50% of normal size — thin liquidity, wide spreads
    min_rvol: 3.0                 # Require 3x RVOL minimum for premarket entries
    min_score: 60                 # Require score 60+ (higher bar for thin liquidity)

  postmarket:
    enabled: true                  # Post-market trading enabled (catch after-hours moves)
    end_time: "20:00"             # Trade until 8 PM ET — spec: scan until 8 PM
    allowed_strategies: ["momentum_runner", "rvol_momentum", "momentum", "rvol_scalp", "low_float_catalyst"]
    reduce_size_pct: 0.40         # Use 40% size — AH liquidity is worst, be small
    min_rvol: 3.0                 # Require 3x RVOL minimum for postmarket entries
    min_score: 60                 # Require score 60+ for postmarket

  # --- Overnight Holding ---
  overnight:
    enabled: true                  # Allow holding overnight
    require_profit: true           # Only hold if position is in profit
    min_profit_pct: 0.05           # Min 5% profit to hold overnight — small caps gap down hard, need bigger cushion
    require_uptrend: true          # Only hold if in uptrend (EMA fast > slow)
    tighten_stop_pct: 0.03        # 3% stop for overnight (matches stop_loss_pct; 4% was too wide)
    max_overnight_positions: 0    # Intraday strategies go flat at EOD. Trend rider has its own bucket.
    close_losers: true            # Always close losing positions at EOD

# --- Scaling Plan ---
# Bot auto-adjusts as account grows
scaling:
  enabled: true
  # Aggressive deployment — use available capital, don't sit on cash
  # Position % stays high at all tiers so the bot actually deploys money
  # Tiers aligned with spec: 1% risk, max 5 momentum positions
  tiers:
    - min_balance: 5000
      max_positions: 5
      risk_per_trade: 0.01
      max_position_pct: 0.20       # ~$1,000 max per position
    - min_balance: 10000
      max_positions: 15
      risk_per_trade: 0.01
      max_position_pct: 0.15       # ~$1,500 max per position
    - min_balance: 25000
      max_positions: 10
      risk_per_trade: 0.01
      max_position_pct: 0.10       # ~$2,500 max per position
    - min_balance: 50000
      max_positions: 10
      risk_per_trade: 0.01
      max_position_pct: 0.10       # ~$5,000 max per position
    - min_balance: 100000
      max_positions: 10
      risk_per_trade: 0.01
      max_position_pct: 0.10       # ~$10K max per position
    - min_balance: 250000
      max_positions: 10
      risk_per_trade: 0.01
      max_position_pct: 0.10       # ~$25K max per position

# --- Hedging ---
# Automatic portfolio protection via inverse ETFs during bearish regimes
hedging:
  enabled: false                     # DISABLED - hedging with inverse ETFs conflicts with small cap runner strategy
  auto_hedge: false                  # Small caps already drop hard in bear markets - just reduce position count
  max_hedge_pct: 0.15
  instruments: ["SH", "SDS", "PSQ", "SQQQ"]

# --- Weekly Watchlist ---
# Symbols actively monitored each week. Auto-includes politician picks.
watchlist:
  # NO static watchlist — scanner discovers extreme momentum dynamically
  symbols: []
  auto_add_politician_picks: false  # Disabled — pure scanner-driven
  track_weekly_performance: true    # Track weekly P&L per symbol

# --- Crypto Configuration ---
# Crypto execution routes through TradersPost's crypto subscription (separate
# from the IBKR-direct equity path). Set TRADERSPOST_WEBHOOK_URL_CRYPTO in
# .env to wire the bot to your crypto venue. Manual /api/signal with a
# crypto-suffixed symbol fetches a real-time price via Yahoo (~5s age).
crypto:
  enabled: true                   # Crypto sleeve active (testing)
  symbols_suffix: ["-USD", "-USDT", "-BTC", "-ETH"]  # How we detect crypto tickers
  # Tradeable crypto universe — these get auto-injected into the
  # crypto-eligible strategies (`allowed_strategies` below) on each cycle.
  # Yahoo Finance is the bar source (~5s age, 24/7). Add/remove symbols
  # to scale the universe; risk is bounded by max_crypto_positions and
  # crypto.risk.max_position_size_pct, not the symbol count.
  #
  # 45-name "fat list" covering L1s, L2s, DeFi, memes, AI/RWA. Data flow:
  # Binance.US first (~60ms, real-time, no auth, 43/45 covered including
  # MATIC→POL and RNDR→RENDER rebrands handled in _BINANCE_ALIASES), Yahoo
  # second (~5s delay, covers MKR-USD and TON-USD which Binance.US doesn't
  # list). STX dropped — neither source serves it. A proper top-by-volume
  # scanner (CoinGecko) is the next iteration so the list stops being static.
  # BCH, FIL, INJ removed 2026-05-18: combined -$100 across 10 trades in the
  # session-5 trade review (BCH -$32 / FIL -$20 / INJ -$46). All three blew up
  # on trailing-stop exits because their ATR is large relative to entry size.
  # Revisit if the trailing-stop gate fix (engine.py:2755) reduces the leak
  # enough that these are net-profitable on the new behavior.
  symbols: [
    "AAVE-USD", "ADA-USD", "ALGO-USD", "APT-USD", "ARB-USD", "ATOM-USD",
    "AVAX-USD", "BONK-USD", "BTC-USD", "COMP-USD", "CRV-USD",
    "DOGE-USD", "DOT-USD", "ETC-USD", "ETH-USD", "FET-USD",
    "FLOKI-USD", "GRT-USD", "HBAR-USD", "ICP-USD", "IMX-USD",
    "JUP-USD", "LINK-USD", "LTC-USD", "MATIC-USD", "MKR-USD", "NEAR-USD",
    "OP-USD", "PEPE-USD", "RNDR-USD", "SEI-USD", "SHIB-USD", "SNX-USD",
    "SOL-USD", "SUI-USD", "TIA-USD", "TON-USD", "TRX-USD",
    "UNI-USD", "WIF-USD", "XLM-USD", "XRP-USD"
  ]
  # Which strategies fire on crypto bars. Equity-scanner-dependent
  # strategies (rvol_*, momentum_runner, premarket_gap, daily_trend_rider)
  # are intentionally excluded — they fetch their candidates from IBKR's
  # equity scanner and have no crypto equivalent yet.
  allowed_strategies: ["mean_reversion", "momentum", "crypto_runner"]
  schedule:
    trading_24h: true             # Crypto markets are 24/7
    trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
  # Concurrent crypto position cap (correlation cluster). A 7-name "diversified"
  # crypto book is really 1 position on BTC beta — alts trade ~0.7+ correlated
  # with BTC most regimes, so a 3% BTC drop hits all 7 stops simultaneously.
  # Enforced in engine._gate_correlation_cluster; works alongside the generic
  # max_positions cap.
  max_concurrent_positions: 5
  risk:
    capital_base: 0              # 2026-07-10 audit: crypto executes on a separate TradersPost
                                 # account but was sized against IBKR net-liq. Set this to the
                                 # crypto account's actual equity BEFORE GOING LIVE — all crypto
                                 # sizing (risk %, max position, floors) then uses it.
                                 # 0 = legacy behavior (size against IBKR balance; fine for paper).
    max_daily_loss_dollars: 300  # 2026-07-10 audit: crypto trades on a separate TradersPost
                                 # account invisible to ALL IBKR-based account guards. Bot-side
                                 # guard pauses new crypto entries when realized crypto P&L over
                                 # the trailing 24h is worse than -$300. 0 = disabled.
    max_position_size_pct: 0.15  # 2026-07-10: was 0.12 — raised alongside the mean_reversion
                                 # risk floor so the ~$2.5-3K intended notional isn't clipped
                                 # by the per-position cap (0.12 × ~$21K ≈ $2.5K was binding).
    stop_loss_pct: 0.04
    trailing_stop_pct: 0.025

# --- Data Sources ---
# PROFESSIONAL ARCHITECTURE: IBKR is the sole data + execution source.
# Polygon removed (delayed data). yfinance kept for reference data only (float, sector).
data:
  primary: "ibkr"                 # Primary & only: IBKR (real-time streaming + scanning + bars + execution)
  fallback: "yfinance"            # Reference data only: float, sector classification (not time-sensitive)
  fallback2: "yfinance"           # Same — no Polygon in the chain
  bar_size: "5 mins"              # 5-minute bars for swing/momentum strategies
  scalp_bar_size: "1 min"         # 1-minute bars for RVOL scalp strategy
  lookback_days: 30               # Historical data lookback
  price_poll_interval: 3          # Poll prices every 3 seconds for scalp exits
  cache_ttl: 180                  # Bar cache TTL. 5-min bars don't roll over until 5 min,
                                  # so 3 min stale is essentially current. Scalp uses a
                                  # separate _cache_ttl_1m (5s), unaffected. The previous 10s
                                  # value plus IBKR pacing (~12s/historical req for 95 symbols)
                                  # meant every cycle was a 100% cache miss → 19-min refetch.

# --- Top Gainers Scanner ---
# Catches the biggest % movers with NO price cap — finds runners at any price.
# Session-aware: adjusts volume/change thresholds for premarket, regular, and after-hours.
# Uses cached Polygon snapshot data — zero extra API calls.
top_gainers:
  enabled: true
  limit: 50                          # Max gainers to track per scan
  # Price floor lowered from $2.00 → $0.20 to feed the penny_runner pool
  # (YMAT-style sub-$1 squeezes). Penny pool has its own 5% size cap + 6% stop,
  # so admitting them at the scanner layer doesn't raise per-trade risk above
  # normal. Volume floors raised in parallel to keep ghost-volume penny junk out.
  premarket:
    min_volume: 100000               # 100K — penny floor demands real volume to qualify (raised from 25K)
    min_change_pct: 10.0             # 10%+ gap — only real squeeze candidates (raised from 5%)
    min_price: 0.20                  # Floor matches penny_runner_price_min
  regular:
    min_volume: 300000               # 300K — RTH penny needs serious flow (raised from 100K)
    min_change_pct: 10.0             # 10%+ intraday — already running, not at the lows
    min_price: 0.20                  # Floor matches penny_runner_price_min
  postmarket:
    min_volume: 150000               # 150K — postmarket penny needs proven flow (raised from 75K)
    min_change_pct: 10.0             # 10%+ AH move — real news, not noise
    min_price: 0.20                  # Floor matches penny_runner_price_min

# --- Execution ---
execution:
  order_type: "limit"             # limit orders only (no market orders)
  limit_offset_pct: 0.003         # Place limit 0.3% from current price (wider for small cap spreads)
  retry_attempts: 3
  retry_delay_seconds: 5
  use_vwap: true                  # Use VWAP for better entries
  partial_fills: true             # Accept partial fills
  time_in_force: "DAY"            # Day orders only

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_size_mb: 50
  backup_count: 10
  log_trades: true
  log_signals: true
  log_risk_checks: true
