# ============================================
# ALGO TRADING BOT - MAIN CONFIGURATION
# ============================================

# --- Trading Mode ---
# scalp = Quick trades, tight stops, intraday only
# swing = Multi-day holds, medium stops, trend following
# hybrid = Scalp + swing: quick intraday profits AND multi-day holds
# invest = Longer holds, wide stops, follow smart money
trading_profile: hybrid

# --- Capital & Account ---
capital:
  starting_balance: 47000         # Synced to real Alpaca paper account (overridden on startup)
  max_portfolio_risk: 0.20        # Max 20% of capital at risk (was 10% - deploy more)
  max_daily_loss: 0.06            # Stop trading if down 6% (~$2,820) - more room to recover
  max_drawdown: 0.18              # Emergency stop at 18% from peak (~$8,460) - paper = learn aggro
  reserve_cash_pct: 0.05          # Only 5% cash reserve (~$2,350) - put money to work

# --- Risk Management ---
risk:
  long_only: true                   # Only allow bullish (buy) entries - matches TradersPost setting
  max_position_size_pct: 0.15     # Max 15% of capital per position (~$7K) - bigger bets
  max_positions: 18               # Max 18 concurrent positions (was 12 - much more active)
  max_equity_positions: 18        # Max 18 equity positions (crypto paused - all slots for stocks)
  max_crypto_positions: 0         # Crypto paused - all capital redirected to equities
  risk_per_trade_pct: 0.02        # Risk 2% per trade (~$940) - more aggressive sizing
  max_correlated_positions: 4     # Max 4 in same sector (was 3 - let winners cluster)
  stop_loss_pct: 0.025            # 2.5% stop loss (keep tight - fast out on losers)
  trailing_stop_pct: 0.014        # 1.4% trailing stop (was 1.6% - lock in even faster)
  take_profit_pct: 0.15           # 15% take profit (was 10% - let the big runners RUN)
  max_slippage_pct: 0.005         # Max 0.5% slippage allowed

  # --- Profit Taking (Partial Exits) ---
  profit_taking:
    enabled: true
    # Scale out at multiple targets - WIDER to let profits run
    targets:
      - pct_from_entry: 0.02      # At +2% profit (was 1.5% - give more room)
        close_pct: 0.20           # Close only 20% (was 25% - keep more in play)
        move_stop: "breakeven"    # Move stop to break even
      - pct_from_entry: 0.05      # At +5% profit (was 3% - let it cook)
        close_pct: 0.25           # Close 25% of remaining (was 33%)
        tighten_trail: 0.012      # Tighten to 1.2% trail (was 1%)
      - pct_from_entry: 0.08      # At +8% profit (was 5%)
        close_pct: 0.25           # Close 25% of remaining (was 33%)
        tighten_trail: 0.01       # Tighten trailing stop to 1%
      - pct_from_entry: 0.12      # At +12% profit (was 8% - REAL runner territory)
        close_pct: 0.50           # Close 50% of remaining
        tighten_trail: 0.008      # 0.8% trail on runner (protect the bag)

  # --- Break Even Stop ---
  breakeven:
    enabled: true
    trigger_pct: 0.01             # Move stop to BE after 1% profit (faster protection)
    buffer_pct: 0.001             # Small buffer above entry (0.1%) to cover commissions
  min_volume: 300000              # Lower volume threshold (was 500K - catch more movers)
  min_price: 0.50                 # Floor: $0.50 — no sub-penny junk
  scanner_max_price: 50.00        # Scanner discovers movers under $50 (where moves START)
  # No hard ceiling — bot rides runners past $50 if uptrend is confirmed

# --- Trading Schedule ---
schedule:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  pre_market_scan: "09:15"       # Scan 15 min before open
  avoid_first_minutes: 5          # Quick 5 min buffer, then catch opening momentum
  avoid_last_minutes: 5           # Trade close momentum, exit 5 min before close
  trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

  # --- Pre-market / Extended Hours ---
  premarket:
    enabled: true                  # Pre-market trading enabled (catches gap plays)
    start_time: "06:00"           # Start earlier at 6 AM (was 7 AM - catch early movers)
    allowed_strategies: ["momentum", "news_sentiment", "rvol_momentum", "rvol_scalp", "prebreakout", "premarket_gap"]
    reduce_size_pct: 0.70         # Use 70% of normal size (was 60% - be bolder)

  postmarket:
    enabled: true                  # Post-market trading enabled (catch after-hours moves)
    end_time: "20:00"             # Trade until 8 PM ET (was 6 PM - catch earnings reactions)
    allowed_strategies: ["momentum", "news_sentiment", "mean_reversion", "rvol_momentum"]
    reduce_size_pct: 0.60         # Use 60% size (was 50% - more conviction)

  # --- Overnight Holding ---
  overnight:
    enabled: true                  # Allow holding overnight
    require_profit: true           # Only hold if position is in profit
    min_profit_pct: 0.005         # Minimum 0.5% profit to hold overnight (was 1% - hold more winners)
    require_uptrend: true          # Only hold if in uptrend (EMA fast > slow)
    tighten_stop_pct: 0.018       # Tighten stop to 1.8% for overnight (was 2%)
    max_overnight_positions: 6    # Max 6 positions held overnight (was 3 - carry more winners)
    close_losers: true            # Always close losing positions at EOD

# --- Scaling Plan ---
# Bot auto-adjusts as account grows
scaling:
  enabled: true
  tiers:
    - min_balance: 5000
      max_positions: 8
      risk_per_trade: 0.025
      max_position_pct: 0.25
    - min_balance: 10000
      max_positions: 12
      risk_per_trade: 0.025
      max_position_pct: 0.18
    - min_balance: 25000
      max_positions: 18
      risk_per_trade: 0.02
      max_position_pct: 0.12
    - min_balance: 50000
      max_positions: 25
      risk_per_trade: 0.025
      max_position_pct: 0.10
    - min_balance: 100000
      max_positions: 35
      risk_per_trade: 0.025
      max_position_pct: 0.08

# --- Hedging ---
# Automatic portfolio protection via inverse ETFs during bearish regimes
hedging:
  enabled: true
  auto_hedge: true                  # Automatically hedge when regime is bearish/crisis
  max_hedge_pct: 0.30               # Max 30% of portfolio in hedge positions
  instruments: ["SH", "SDS", "PSQ", "SQQQ"]  # Available hedge ETFs

# --- Weekly Watchlist ---
# Symbols actively monitored each week. Auto-includes politician picks.
watchlist:
  # Focus: $2-$50 high-beta names that move 10-100%+ on catalysts
  # Mega-caps (GOOGL, AAPL, SPY) removed — too slow for small accounts
  # Polygon scanner dynamically adds ALL movers anyway
  symbols:
    - SOFI        # Fintech, volatile, $5-15 range
    - HOOD        # Retail favorite, big swings
    - PLTR        # High beta tech
    - IONQ        # Quantum computing, explosive moves
    - MARA        # Crypto miner proxy, huge % swings
    - RIOT        # Crypto miner proxy
    - SOUN        # AI small cap, runner
    - GSAT        # Low float satellite play
    - DNA         # Biotech, big catalyst moves
    - OPEN        # Real estate tech, volatile
    - WISH        # Low float, short squeeze candidate
    - PLUG        # Clean energy, volatile
    - LCID        # EV, big % moves
    - RIVN        # EV, volatile
    - JOBY        # Air taxi, speculative
    - SKLZ        # Gaming, low float
    - CLSK        # Crypto miner, volatile
    - AFRM        # BNPL fintech
    - UPST        # AI lending, big earnings moves
    - SWN         # Energy, moves on gas prices
  auto_add_politician_picks: true   # Auto-add symbols from politician tracker
  track_weekly_performance: true    # Track weekly P&L per symbol

# --- Crypto Configuration ---
# PAUSED: All capital redirected to equities for more stock positions
crypto:
  enabled: false                  # PAUSED - focusing all capital on equities
  symbols_suffix: ["-USD", "-USDT", "-BTC", "-ETH"]  # How we detect crypto tickers
  schedule:
    trading_24h: false            # Disabled - no 24/7 trading
    trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
  risk:
    max_position_size_pct: 0.12
    stop_loss_pct: 0.04
    trailing_stop_pct: 0.025

# --- Data Sources ---
data:
  primary: "polygon"              # Primary: Polygon.io (real-time scanning + prices + bars)
  fallback: "yfinance"            # Fallback to yfinance
  bar_size: "5 mins"              # 5-minute bars for swing/momentum strategies
  scalp_bar_size: "1 min"         # 1-minute bars for RVOL scalp strategy
  lookback_days: 30               # Historical data lookback
  price_poll_interval: 3          # Poll prices every 3 seconds for scalp exits
  cache_ttl: 10                   # 10-second cache TTL (was 30s, too slow for scalps)

# --- Execution ---
execution:
  order_type: "limit"             # limit orders only (no market orders)
  limit_offset_pct: 0.001         # Place limit 0.1% from current price
  retry_attempts: 3
  retry_delay_seconds: 5
  use_vwap: true                  # Use VWAP for better entries
  partial_fills: true             # Accept partial fills
  time_in_force: "DAY"            # Day orders only

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_size_mb: 50
  backup_count: 10
  log_trades: true
  log_signals: true
  log_risk_checks: true
