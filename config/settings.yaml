# ============================================
# ALGO TRADING BOT - MAIN CONFIGURATION
# ============================================

# --- Trading Mode ---
# scalp = Quick trades, tight stops, intraday only
# swing = Multi-day holds, medium stops, trend following
# hybrid = Scalp + swing: quick intraday profits AND multi-day holds
# invest = Longer holds, wide stops, follow smart money
trading_profile: hybrid

# --- Capital & Account ---
capital:
  starting_balance: 47000         # Synced to real Alpaca paper account (overridden on startup)
  max_portfolio_risk: 0.10        # Max 10% of capital at risk at any time
  max_daily_loss: 0.04            # Stop trading if down 4% in a day (~$1,880)
  max_drawdown: 0.12              # Emergency stop if down 12% from peak (~$5,640)
  reserve_cash_pct: 0.10          # Keep 10% cash reserve (~$4,700)

# --- Risk Management ---
risk:
  long_only: true                   # Only allow bullish (buy) entries - matches TradersPost setting
  max_position_size_pct: 0.15     # Max 15% of capital per position (~$7K at $47K)
  max_positions: 10               # Max 10 concurrent positions
  risk_per_trade_pct: 0.015       # Risk 1.5% per trade (~$705)
  max_correlated_positions: 2     # Max 2 positions in same sector
  stop_loss_pct: 0.025            # 2.5% stop loss (tighter = faster out on losers)
  trailing_stop_pct: 0.018        # 1.8% trailing stop (locks in profit faster)
  take_profit_pct: 0.05           # 5% take profit (more realistic targets hit more often)
  max_slippage_pct: 0.005         # Max 0.5% slippage allowed

  # --- Profit Taking (Partial Exits) ---
  profit_taking:
    enabled: true
    # Scale out at multiple targets (percentage of position to close)
    targets:
      - pct_from_entry: 0.015     # At +1.5% profit - take first bite early
        close_pct: 0.25           # Close 25% of position
        move_stop: "breakeven"    # Move stop to break even
      - pct_from_entry: 0.03      # At +3% profit
        close_pct: 0.33           # Close 33% of remaining
        tighten_trail: 0.01       # Tighten trailing stop to 1%
      - pct_from_entry: 0.05      # At +5% profit
        close_pct: 0.50           # Close 50% of remaining
        tighten_trail: 0.008      # Very tight 0.8% trail on runner

  # --- Break Even Stop ---
  breakeven:
    enabled: true
    trigger_pct: 0.01             # Move stop to BE after 1% profit (faster protection)
    buffer_pct: 0.001             # Small buffer above entry (0.1%) to cover commissions
  min_volume: 500000              # Minimum avg daily volume
  min_price: 5.00                 # No penny stocks
  max_price: 2000.00              # Cap price (accommodates NVDA, MSFT, etc)

# --- Trading Schedule ---
schedule:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  pre_market_scan: "09:15"       # Scan 15 min before open
  avoid_first_minutes: 5          # Quick 5 min buffer, then catch opening momentum
  avoid_last_minutes: 5           # Trade close momentum, exit 5 min before close
  trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]

  # --- Pre-market / Extended Hours ---
  premarket:
    enabled: true                  # Pre-market trading enabled (catches gap plays)
    start_time: "07:00"           # Start pre-market scanning at 7 AM for gap scanners
    allowed_strategies: ["momentum", "news_sentiment", "rvol_momentum", "rvol_scalp"]  # All aggressive strategies
    reduce_size_pct: 0.60         # Use 60% of normal position size (decent liquidity on big names)

  # --- Overnight Holding ---
  overnight:
    enabled: true                  # Allow holding overnight
    require_profit: true           # Only hold if position is in profit
    min_profit_pct: 0.01          # Minimum 1% profit to hold overnight
    require_uptrend: true          # Only hold if in uptrend (EMA fast > slow)
    tighten_stop_pct: 0.02        # Tighten stop to 2% for overnight holds
    max_overnight_positions: 3    # Max 3 positions held overnight
    close_losers: true            # Always close losing positions at EOD

# --- Scaling Plan ---
# Bot auto-adjusts as account grows
scaling:
  enabled: true
  tiers:
    - min_balance: 5000
      max_positions: 6
      risk_per_trade: 0.02
      max_position_pct: 0.25
    - min_balance: 10000
      max_positions: 8
      risk_per_trade: 0.02
      max_position_pct: 0.20
    - min_balance: 25000
      max_positions: 12
      risk_per_trade: 0.015
      max_position_pct: 0.10
    - min_balance: 50000
      max_positions: 15
      risk_per_trade: 0.02
      max_position_pct: 0.08
    - min_balance: 100000
      max_positions: 20
      risk_per_trade: 0.02
      max_position_pct: 0.06

# --- Hedging ---
# Automatic portfolio protection via inverse ETFs during bearish regimes
hedging:
  enabled: true
  auto_hedge: true                  # Automatically hedge when regime is bearish/crisis
  max_hedge_pct: 0.30               # Max 30% of portfolio in hedge positions
  instruments: ["SH", "SDS", "PSQ", "SQQQ"]  # Available hedge ETFs

# --- Weekly Watchlist ---
# Symbols actively monitored each week. Auto-includes politician picks.
watchlist:
  symbols:
    - NVDA
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - TSLA
    - AMD
    - SPY
    - QQQ
    - AB          # Pelosi pick
    # Crypto (trades 24/7 via Alpaca)
    - BTC-USD     # Bitcoin
    - ETH-USD     # Ethereum
    - SOL-USD     # Solana
    - DOGE-USD    # Dogecoin
    - AVAX-USD    # Avalanche
    - LINK-USD    # Chainlink
    - XRP-USD     # Ripple
  auto_add_politician_picks: true   # Auto-add symbols from politician tracker
  track_weekly_performance: true    # Track weekly P&L per symbol

# --- Crypto Configuration ---
# Crypto symbols trade 24/7 and bypass stock market hours
crypto:
  enabled: true
  symbols_suffix: ["-USD", "-USDT", "-BTC", "-ETH"]  # How we detect crypto tickers
  schedule:
    trading_24h: true             # Trade crypto 24 hours a day
    trading_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
  risk:
    max_position_size_pct: 0.10   # Smaller size for crypto (more volatile)
    stop_loss_pct: 0.05           # Wider stop for crypto volatility
    trailing_stop_pct: 0.03       # Wider trailing stop

# --- Data Sources ---
data:
  primary: "ibkr"                 # Primary data from IBKR
  fallback: "yfinance"            # Fallback to yfinance
  bar_size: "5 mins"              # 5-minute bars for swing/momentum strategies
  scalp_bar_size: "1 min"         # 1-minute bars for RVOL scalp strategy
  lookback_days: 30               # Historical data lookback
  price_poll_interval: 3          # Poll prices every 3 seconds for scalp exits
  cache_ttl: 10                   # 10-second cache TTL (was 30s, too slow for scalps)

# --- Execution ---
execution:
  order_type: "limit"             # limit orders only (no market orders)
  limit_offset_pct: 0.001         # Place limit 0.1% from current price
  retry_attempts: 3
  retry_delay_seconds: 5
  use_vwap: true                  # Use VWAP for better entries
  partial_fills: true             # Accept partial fills
  time_in_force: "DAY"            # Day orders only

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_size_mb: 50
  backup_count: 10
  log_trades: true
  log_signals: true
  log_risk_checks: true
